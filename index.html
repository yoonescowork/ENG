<title>토익 단어·문법 학습기</title>
<style>
:root{
  --bg:#0c0a09; --surface:#1c1917; --inner:#0c0a09; --border:#292524; --border2:#44403c;
  --t1:#f5f5f4; --t2:#a8a29e; --t3:#78716c; --t4:#57534e;
  --amber:#f59e0b; --amber-l:#fcd34d;
  --em:#34d399; --em-l:#6ee7b7; --em-bg:rgba(6,78,59,.5); --em-bd:#065f46;
  --ro:#fb7185; --ro-l:#fda4af; --ro-bg:rgba(76,5,25,.5); --ro-bd:#9f1239;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
html{-webkit-text-size-adjust:100%}
*{-webkit-tap-highlight-color:transparent}
button,label{touch-action:manipulation}
body{
  margin:0; background:var(--bg); color:var(--t1);
  font-family:-apple-system,BlinkMacSystemFont,system-ui,"Segoe UI",Roboto,sans-serif;
  font-size:16px; line-height:1.55; overflow-wrap:break-word;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}
.wrap{max-width:480px; margin:0 auto; padding:18px 16px calc(48px + env(safe-area-inset-bottom))}
.serif{font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif}
.mono{font-family:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace}
button{font-family:inherit; color:inherit; background:none; border:none; cursor:pointer; touch-action:manipulation; font-size:16px}
p{margin:0}

.amber{color:var(--amber-l)} .em{color:var(--em-l)} .t1{color:var(--t1)}
.eyebrow{font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--t3)}
.eyebrow.amber{color:rgba(245,158,11,.85)}

/* header */
.hd{margin-bottom:16px}
.h1{margin:4px 0 0; font-size:26px; font-weight:700; color:#fafaf9}
.lead{margin-top:8px; font-size:14px; color:var(--t2)}

/* card */
.card{border:1px solid var(--border); background:var(--surface); border-radius:14px}

/* dashboard */
.dash{padding:14px; margin-bottom:18px}
.dash-top{display:flex; align-items:center; justify-content:space-between; margin-bottom:12px}
.reset{font-size:11px; color:var(--t4)}
.reset:active{color:var(--t2)}
.confirm{display:flex; align-items:center; gap:8px; font-size:11px}
.cq{color:var(--t2)}
.cbtn{font-size:11px; padding:3px 9px; border-radius:6px}
.cbtn.yes{background:#7f1d1d; color:var(--ro-l)}
.cbtn.no{background:var(--border); color:var(--t2)}
.stats{display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px}
.stat{background:var(--inner); border-radius:10px; padding:10px 8px}
.lbl{font-size:11px; color:var(--t3)}
.big{margin-top:3px; font-size:22px; font-weight:700; line-height:1.1}
.sub{margin-top:2px; font-size:11px; color:var(--t4)}
.bar{margin-top:12px; height:6px; width:100%; background:var(--border); border-radius:99px; overflow:hidden}
.bar-fill{height:100%; background:var(--amber); border-radius:99px; transition:width .3s}
.note{margin-top:12px; font-size:11px; color:var(--t4)}

/* tabs */
.tabs{display:grid; grid-template-columns:repeat(5,1fr); gap:6px; position:sticky; top:0; z-index:40; background:var(--bg,#0c0a09); margin:0 -16px 14px; padding:10px 16px}
.tab{padding:8px 2px; min-height:44px; border-radius:10px; font-size:13px; font-weight:600; background:var(--surface); color:var(--t2); text-align:center; white-space:nowrap; overflow:hidden}
.tab.active{background:#f5f5f4; color:#0c0a09}

/* chips (가로 스크롤) */
.chips{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:14px}
.chips[data-ck="gchap"]{grid-template-columns:repeat(2,1fr)}
.chips::-webkit-scrollbar{display:none}
.chip{display:block; text-align:left; padding:13px 8px 15px; min-height:46px; border:1px solid var(--border); background:var(--surface); border-radius:10px; color:var(--t2); font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.chip .chip-l{margin-right:5px}
.chip.active{border-color:#b45309; background:rgba(245,158,11,.1); color:var(--amber-l)}
.chip-l{font-size:11px; color:var(--t3)}

/* pills */
.pills{display:flex; align-items:center; gap:8px; margin-bottom:14px; flex-wrap:wrap}
.pill{padding:8px 12px; min-height:38px; border-radius:8px; font-size:14px; font-weight:500; background:var(--border); color:var(--t2)}
.pill.active{background:var(--amber); color:#0c0a09}
.minibtn{padding:7px 12px; min-height:36px; border-radius:8px; font-size:12px; background:var(--border); color:var(--t3); font-family:ui-monospace,Menlo,monospace}
.minibtn.right{margin-left:auto}
.minibtn.on{background:#7f1d1d; color:var(--ro-l)}

/* vocab cards */
.vgrid{display:flex; flex-direction:column; gap:12px}
.vcard{position:relative; border:1px solid var(--border); background:var(--surface); border-radius:14px; padding:14px}
.vcard.ring-known{border-color:rgba(4,120,87,.6)}
.vcard.ring-fuzzy{border-color:rgba(180,83,9,.6)}
.vcard.ring-unknown{border-color:rgba(159,18,57,.6)}
.vnum{position:absolute; right:12px; top:12px; font-size:11px; color:var(--t4)}
.vdot{position:absolute; left:12px; top:14px; width:8px; height:8px; border-radius:99px}
.dot-known{background:var(--em)} .dot-fuzzy{background:var(--amber)} .dot-unknown{background:var(--ro)}
.vface{display:block; width:100%; text-align:left; padding:6px 0 2px; min-height:96px}
.vword{font-size:24px; font-weight:600; color:#fafaf9; line-height:1.15; padding-right:24px}
.vpos{margin-top:4px; font-size:11px; color:var(--t3)}
.vhint{margin-top:10px; font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:rgba(245,158,11,.7)}
.vmean{font-size:18px; font-weight:500; color:var(--amber-l)}
.vex{margin-top:8px; font-size:14px; font-style:italic; color:var(--t2); line-height:1.45}
.vtip{margin-top:8px; font-size:12px; color:var(--t2); background:var(--inner); border-radius:8px; padding:6px 8px}
.marks{display:flex; gap:6px; margin-top:12px}
.mark{flex:1; padding:9px 4px; min-height:40px; border-radius:8px; font-size:12px; background:var(--border); color:var(--t3); font-family:ui-monospace,Menlo,monospace}
.mark.known.on{background:#064e3b; color:var(--em-l)}
.mark.fuzzy.on{background:#78350f; color:var(--amber-l)}
.mark.unknown.on{background:#7f1d1d; color:var(--ro-l)}

.empty{border:1px solid var(--border); background:var(--surface); border-radius:14px; padding:28px 16px; text-align:center; font-size:14px; color:var(--t2)}

/* rules */
.rules{display:flex; flex-direction:column; gap:8px; margin-bottom:22px}
.rule{border:1px solid var(--border); background:var(--surface); border-radius:14px; overflow:hidden}
.rule-h{display:flex; align-items:center; gap:12px; width:100%; text-align:left; padding:12px 14px; min-height:52px}
.rnum{flex:0 0 auto; width:28px; height:28px; display:flex; align-items:center; justify-content:center; border-radius:8px; background:var(--amber); color:#0c0a09; font-size:14px; font-weight:700}
.rt{flex:1; font-size:14px; font-weight:500}
.rtoggle{color:var(--t3); font-size:16px}
.rule-b{border-top:1px solid var(--border); padding:12px 14px}
.rb{font-size:14px; color:var(--t2); line-height:1.55}
.rex{margin-top:8px; font-size:12px; color:rgba(253,230,138,.9); background:var(--inner); border-radius:8px; padding:8px 10px; line-height:1.5}
.h3{margin:0 0 12px; font-size:18px; font-weight:600}

/* quiz */
.qmeta{display:flex; justify-content:space-between; font-size:12px; color:var(--t3); margin-bottom:12px}
.qlist{display:flex; flex-direction:column; gap:12px}
.qcard{border:1px solid var(--border); background:var(--surface); border-radius:14px; padding:14px}
.qtext{font-size:15px; font-weight:500; line-height:1.55; color:var(--t1)}
.qn{margin-right:8px; font-size:12px; color:var(--t3)}
.opts{display:flex; flex-direction:column; gap:8px; margin-top:12px}
.opt{display:block; width:100%; text-align:left; border:1px solid var(--border2); background:var(--border); color:var(--t1); border-radius:10px; padding:11px 12px; min-height:44px; font-size:14px; line-height:1.4}
.opt .ol{margin-right:8px; font-size:12px; color:var(--t3)}
.opt.correct{border-color:#059669; background:var(--em-bg); color:var(--em-l)}
.opt.wrong{border-color:var(--ro-bd); background:var(--ro-bg); color:var(--ro-l)}
.opt.dim{border-color:var(--border); background:var(--surface); color:var(--t4)}
.expl{margin-top:12px; border:1px solid var(--border); background:var(--inner); border-radius:10px; padding:10px 12px; font-size:14px; line-height:1.55; color:var(--t2)}
.vchips{display:flex; flex-wrap:wrap; gap:8px; margin-top:10px}
.vchip{background:var(--border); border-radius:8px; padding:6px 8px; font-size:12px; color:rgba(253,230,138,.9)}

/* reading */
.reading{display:flex; flex-direction:column; gap:26px}
.note-card{padding:14px}
.tip-title{font-size:14px; font-weight:500; color:var(--amber-l)}
.tip-html{-webkit-text-size-adjust:100%}
*{-webkit-tap-highlight-color:transparent}
button,label{touch-action:manipulation}
body{margin-top:8px; font-size:14px; color:var(--t2); line-height:1.55}
.passage .ptext{padding:14px; font-size:14px; line-height:1.6; color:#e7e5e4; margin-bottom:14px}
.passage .ptext p{margin-bottom:8px}
.passage .ptext p:last-child{margin-bottom:0}

footer{margin-top:36px; text-align:center; font-size:11px; color:var(--t4); font-family:ui-monospace,Menlo,monospace}

/* v2 additions */
.tabs::-webkit-scrollbar{display:none}
.wmeta{font-size:11px; color:var(--t4); margin-bottom:8px}
.trbtn{display:inline-block;margin-top:8px;font-size:11px;color:var(--amber,#f59e0b);text-decoration:underline;cursor:pointer}
.trx{margin-top:6px;font-size:13px;line-height:1.6;color:var(--t2,#d6d3d1);background:rgba(245,158,11,.06);border-left:2px solid rgba(245,158,11,.4);padding:8px 10px;border-radius:0 8px 8px 0}
.mockbar{display:flex;justify-content:space-between;align-items:center;gap:8px}
.seg{display:inline-flex;border:1px solid rgba(255,255,255,.14);border-radius:999px;overflow:hidden}
.segbtn{padding:9px 14px;background:transparent;border:0;color:var(--t3,#a8a29e);font-size:13px;cursor:pointer;min-height:40px}
.segbtn.active{background:var(--amber,#f59e0b);color:#141110;font-weight:600}
.segbtn+.segbtn{border-left:1px solid rgba(255,255,255,.14)}
.chip{position:relative;overflow:hidden}
.chipbar{position:absolute;left:12px;right:12px;bottom:4px;height:2px;background:rgba(255,255,255,.10);border-radius:2px;pointer-events:none}
.chipbar span{position:absolute;left:0;top:0;bottom:0;background:var(--amber,#f59e0b);border-radius:2px}
.vbadge{margin-top:10px;font-size:11px;line-height:1.5;color:var(--amber-l,#fcd34d);background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);border-radius:8px;padding:6px 8px}
.qvcard{margin-top:10px;border:1px solid rgba(159,18,57,.5);background:var(--inner,#0c0a09);border-radius:10px;padding:12px}
.qvw{font-size:20px;font-weight:600;color:#fafaf9;line-height:1.2}
.qvp{font-size:11px;font-weight:400;color:var(--t3,#78716c);margin-left:6px}
.qvm{margin-top:4px;font-size:16px;font-weight:500;color:var(--amber-l,#fcd34d)}
.qvnote{margin-top:8px;font-size:11px;color:var(--t4,#57534e)}
.vcs{margin-top:7px;font-size:11.5px;line-height:1.55;color:var(--t2,#a8a29e)}
.vcs-l{display:inline-block;margin-right:6px;padding:1px 5px;border-radius:5px;font-size:10px;color:var(--amber-l,#fcd34d);background:rgba(245,158,11,.1)}
.io{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-top:12px;font-size:11px}
.iobtn{cursor:pointer;border:1px solid var(--border2,#44403c);background:transparent;color:var(--t2,#a8a29e);border-radius:8px;padding:5px 9px;font-size:11px;font-family:inherit}
.iobtn.warn{border-color:rgba(245,158,11,.5);color:var(--amber-l,#fcd34d)}
.io-confirm,.io-msg{color:var(--t3,#78716c);display:inline-flex;align-items:center;gap:6px}
.undobar{display:flex;align-items:center;justify-content:space-between;gap:8px;border:1px solid var(--border2,#44403c);background:var(--surface,#1c1917);border-radius:10px;padding:8px 10px;margin-bottom:12px;font-size:12px;color:var(--t2,#a8a29e)}
@media (max-width:389px){.segbtn{padding:8px 10px;font-size:12px}.minibtn{font-size:11px;padding:6px 9px}}
</style>
</head>
<body>

"safety inspector": ["a quarterly safety inspector visit (분기별 안전 검사관 방문)", "≒ safety examiner"],
"time constraint": ["due to time constraints (시간 제약으로 인해)", "≒ time limitation"],
"contingency plan": ["prepare a contingency plan (비상 계획을 마련하다)", "≒ backup plan"],

"terms of agreement": ["read the terms of agreement (계약 조건을 읽다)", "≒ contract terms"],
"billing statement": ["monthly billing statement (월간 청구서)", "≒ invoice"],
"obligation to": ["an obligation to report leaks (누수를 신고할 의무)", "≒ duty to, responsibility to"],
"job opening": ["post a job opening (채용 공고를 내다)", "≒ vacancy, position"],
"contribution to": ["contributions to the project (프로젝트에 대한 기여)", "≒ input, part"],
"baggage allowance": ["a baggage allowance of one bag (수하물 허용량 1개)", "≒ luggage limit"],
"performance appraisal": ["annual performance appraisals (연간 인사 평가)", "≒ performance review"],
"compliance with": ["in full compliance with emission rules (배출 규정을 전면 준수하여)", "≒ conformity with"],
"confidence in": ["confidence in the new leadership (새 경영진에 대한 신뢰)", "≒ trust in"],
"commitment to": ["commitment to local ingredients (지역 재료에 대한 헌신)", "≒ dedication to"],

};
</script>
<script>
(function () {
  "use strict";

  // ===== 챕터 구성 =====
  var VOCAB_CHAPTERS = [
    { id: "v1", title: "동사", label: "V1", words: VOCAB_V1 },
    { id: "v2", title: "명사", label: "V2", words: VOCAB_V2 },
    { id: "v3", title: "형용사", label: "V3", words: VOCAB_V3 },
    { id: "v4", title: "부사", label: "V4", words: VOCAB_V4 },
    { id: "v5", title: "형용사 어구", label: "V5", words: VOCAB_V5 },
    { id: "v6", title: "동사 어구 1", label: "V6", words: VOCAB_V6 },
    { id: "v7", title: "동사 어구 2", label: "V7", words: VOCAB_V7 },
    { id: "v8", title: "명사 어구", label: "V8", words: VOCAB_V8 },
  ];
  var GRAMMAR_CHAPTERS = [
    { id: "g1", title: "주어·동사", label: "G1", data: GRAMMAR_G1 },
    { id: "g2", title: "목적어·보어·수식어", label: "G2", data: GRAMMAR_G2 },
    { id: "g3", title: "동사의 형태와 종류", label: "G3", data: GRAMMAR_G3 },
    { id: "g4", title: "주어와의 수일치", label: "G4", data: GRAMMAR_G4 },
    { id: "g5", title: "능동태·수동태", label: "G5", data: GRAMMAR_G5 },
    { id: "g6", title: "시제와 가정법", label: "G6", data: GRAMMAR_G6 },
    { id: "g7", title: "to 부정사", label: "G7", data: GRAMMAR_G7 },
    { id: "g18", title: "명사절", label: "G18", data: GRAMMAR_G18 },
  ];
  var VOCAB_MAP = {}, ALL_VOCAB = [];
  VOCAB_CHAPTERS.forEach(function (c) { c.words.forEach(function (v) { VOCAB_MAP[v.w] = v; ALL_VOCAB.push(v); }); });
  var TOTAL_VOCAB = ALL_VOCAB.length;

  // ===== 날짜 (기기 로컬 기준) =====
  function pad2(n) { return String(n).padStart(2, "0"); }
  function today() { var d = new Date(); return d.getFullYear() + "-" + pad2(d.getMonth() + 1) + "-" + pad2(d.getDate()); }

  // ===== 진도 저장 v2 =====
  var KEY = "toeic:progress:v2", OLD_KEY = "toeic:progress:v1";
  function empty() { return { version: 2, vocab: {}, quiz: { total: { solved: 0, correct: 0 }, days: {}, first: {} }, wrong: {} }; }
  function migrateV1(old) {
    var p = empty();
    try {
      Object.keys(old.vocab || {}).forEach(function (w) { p.vocab[w] = { s: old.vocab[w], t: today(), q: 0 }; });
      if (old.quiz) {
        if (old.quiz.total) p.quiz.total = old.quiz.total;
        if (old.quiz.days) p.quiz.days = old.quiz.days;
      }
    } catch (e) {}
    return p;
  }
  function loadProgress() {
    try {
      var r = localStorage.getItem(KEY);
      if (r) {
        var p = JSON.parse(r) || {}, b = empty();
        b.vocab = p.vocab || {};
        if (p.quiz) {
          b.quiz.total = p.quiz.total || b.quiz.total;
          b.quiz.days = p.quiz.days || {};
          b.quiz.first = p.quiz.first || {};
        }
        b.wrong = p.wrong || {};
        return b;
      }
      var o = localStorage.getItem(OLD_KEY);
      if (o) {
        var m = migrateV1(JSON.parse(o));
        try { localStorage.setItem(KEY, JSON.stringify(m)); } catch (e) {}
        return m;
      }
    } catch (e) {}
    return empty();
  }
  function saveNow() { try { localStorage.setItem(KEY, JSON.stringify(state.progress)); } catch (e) {} }
  var storageOK = (function () { try { localStorage.setItem("__t", "1"); localStorage.removeItem("__t"); return true; } catch (e) { return false; } })();

  // ===== 상태 =====
  var state = {
    progress: loadProgress(),
    tab: "vocab",
    vc: "all", gc: "g1",
    vmode: "cards", review: false,
    seed: 0, rseed: 0, wseed: 0,
    flips: {}, open: {}, answers: {}, trOpen: {},
    vquiz: null, vquizKey: null, vgen: 0,
    rvq: null, rvgen: 0, lastMark: null,
    importData: null, ioMsg: null,
    wq: null, wqKey: null,
    rq: null, rqKey: null,
    mock: null, mockN: 0,
    confirm: false,
  };
  GRAMMAR_CHAPTERS.forEach(function (c) { state.open[c.id + "-0"] = true; });

  // ===== 유틸 =====
  function esc(s) { return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
  function escA(s) { return esc(s).replace(/"/g, "&quot;"); }
  function shuffle(a) { a = a.slice(); for (var i = a.length - 1; i > 0; i--) { var j = Math.floor(Math.random() * (i + 1)); var t = a[i]; a[i] = a[j]; a[j] = t; } return a; }
  function vs(w) { var e = state.progress.vocab[w]; return e && e.s; }
  function fmtT(ms) { var s = Math.floor(ms / 1000); return pad2(Math.floor(s / 60)) + ":" + pad2(s % 60); }
  function daysSince(ds) {
    if (!ds) return 0;
    var p = ds.split("-"), d = new Date(+p[0], +p[1] - 1, +p[2]);
    return Math.floor((Date.now() - d.getTime()) / 86400000);
  }
  // '안다' 단어의 재검증 주기: 7일 → 통과 시 21일 → 45일
  function nextIv(iv) { return iv >= 21 ? 45 : 21; }
  function isRusty(w) {
    var e = state.progress.vocab[w];
    return !!(e && e.s === "known" && daysSince(e.t) >= (e.iv || 7));
  }

  // ===== 보기 셔플 + 문제 ID + 해석 연결 =====
  var QMAP = {};
  function shuffleQ(q, id, meta) {
    var idx = shuffle(q.o.map(function (_, i) { return i; }));
    var s = { id: id, meta: meta, q: q.q, o: idx.map(function (i) { return q.o[i]; }), a: idx.indexOf(q.a), e: q.e, words: q.words, tr: (typeof TRS !== "undefined" ? TRS[id] : null) };
    QMAP[id] = s;
    return s;
  }
  GRAMMAR_CHAPTERS.forEach(function (c) {
    c.data = { rules: c.data.rules, q: c.data.q.map(function (q, i) { return shuffleQ(q, c.id + ":" + i, c.label + " " + c.title); }) };
  });
  READING.forEach(function (psg, pi) {
    psg.q = psg.q.map(function (q, i) { return shuffleQ(q, "r" + pi + ":" + i, "독해 · " + psg.title); });
  });

  // ===== 어형(품사) 문제: 같은 어근의 품사 4형태 중 선택 =====
  var WF_QS = [];
  if (typeof WF !== "undefined") {
    Object.keys(WF).forEach(function (w) {
      var b = BQ[w];
      if (!b) return;
      var opts = shuffle([b.c].concat(WF[w].o));
      var id = "f:" + w;
      var q = {
        id: id, meta: "어형 · 품사 자리",
        q: b.s, o: opts, a: opts.indexOf(b.c),
        e: WF[w].e + " → " + b.c + ". 나머지 보기는 품사가 달라 빈칸에 올 수 없다.",
        tr: (typeof TRS !== "undefined" ? TRS["v:" + w] : null),
      };
      QMAP[id] = q;
      WF_QS.push(q);
    });
  }
  function wfInChapter(q, ch) {
    var w = q.id.slice(2);
    return ch.words.some(function (v) { return v.w === w; });
  }

  // ===== 어휘 문제 (Part 5 형식: 문장 빈칸 + 영어 보기 4개) =====
  function vocabQ(v) {
    var b = BQ[v.w];
    if (!b) return null;
    var opts = shuffle([b.c].concat(b.o));
    var id = "v:" + v.w;
    var q = {
      id: id, w: v.w, meta: "어휘 · " + v.p,
      q: b.s, o: opts, a: opts.indexOf(b.c),
      e: b.c + " (" + v.w + ") · " + v.m + " · " + v.tip,
      tr: (typeof TRS !== "undefined" ? TRS[id] : null),
    };
    QMAP[id] = q;
    return q;
  }
  // 취약 단어(모른다/헷갈린다)를 우선 출제
  function pickVocab(list, n) {
    var due = [], rusty = [], rest = [];
    list.forEach(function (v) {
      var s = vs(v.w);
      if (s === "unknown" || s === "fuzzy") due.push(v);
      else if (isRusty(v.w)) rusty.push(v);
      else rest.push(v);
    });
    return shuffle(due).concat(shuffle(rusty), shuffle(rest)).slice(0, n);
  }
  function ensureVQuiz() {
    var all = state.vc === "all";
    var k = state.vc + ":" + state.seed;
    if (state.vquizKey !== k) {
      state.vquizKey = k;
      state.vgen++; // 재생성 세대: 이전 세대의 답안 키가 새 문제에 매핑되는 것을 방지
      var ch = all ? null : VOCAB_CHAPTERS.find(function (c) { return c.id === state.vc; });
      var pool = all ? ALL_VOCAB : ch.words;
      var wfPool = all ? WF_QS : WF_QS.filter(function (q) { return wfInChapter(q, ch); });
      var forms = shuffle(wfPool).slice(0, 3);
      var inForms = {};
      forms.forEach(function (q) { inForms[q.id.slice(2)] = 1; });
      var picks = pickVocab(pool.filter(function (v) { return !inForms[v.w]; }), 10 - forms.length);
      var qs = picks.map(vocabQ).filter(Boolean);
      forms.forEach(function (f) { // 취약 단어(앞쪽)를 밀어내지 않도록 3번째 이후에 삽입
        var at = Math.min(qs.length, 2 + Math.floor(Math.random() * (qs.length - 1)));
        qs.splice(at, 0, f);
      });
      state.vquiz = qs;
    }
    return state.vquiz;
  }

  // ===== 복습 대상 =====
  function dueWords() {
    return ALL_VOCAB.filter(function (x) { var s = vs(x.w); return s === "unknown" || s === "fuzzy"; });
  }
  function rustyWords() { return ALL_VOCAB.filter(function (x) { return isRusty(x.w); }); }
  function ensureRWords() {
    var k = "r:" + state.rseed;
    if (state.rqKey !== k) { state.rqKey = k; state.rq = shuffle(dueWords()).concat(shuffle(rustyWords())).slice(0, 10); }
    return state.rq;
  }
  function ensureWQuiz() {
    var k = "w:" + state.wseed;
    if (state.wqKey !== k) {
      state.wqKey = k;
      var wr = state.progress.wrong;
      state.wq = shuffle(Object.keys(wr).map(function (id) {
        return (id.indexOf("v:") === 0 || wr[id].grad) ? null : QMAP[id];
      }).filter(Boolean));
    }
    return state.wq;
  }

  // ===== 실전 세트 (오답 우선 + 문법/어휘 혼합 20문제) =====
  function startMock() {
    var used = {};
    var wr = state.progress.wrong;
    var active = [], gradDue = [];
    Object.keys(wr).forEach(function (id) {
      var q = QMAP[id];
      if (!q || id.indexOf("v:") === 0) return;
      if (!wr[id].grad) active.push(q);
      else if (daysSince(wr[id].grad) >= 14) gradDue.push(q);
    });
    var wrong = shuffle(active).concat(shuffle(gradDue)).slice(0, 6);
    wrong.forEach(function (q) { used[q.id] = 1; });
    var gAll = [];
    GRAMMAR_CHAPTERS.forEach(function (c) { c.data.q.forEach(function (q) { if (!used[q.id]) gAll.push(q); }); });
    var gN = Math.ceil((20 - wrong.length) / 2);
    var g = shuffle(gAll).slice(0, gN);
    var vN = 20 - wrong.length - g.length;
    var forms = shuffle(WF_QS.filter(function (q) { return !used[q.id]; })).slice(0, Math.min(3, vN));
    var inForms = {};
    forms.forEach(function (q) { inForms[q.id.slice(2)] = 1; });
    var vPick = pickVocab(ALL_VOCAB.filter(function (v) { return !inForms[v.w]; }), vN - forms.length).map(vocabQ).filter(Boolean);
    vPick = vPick.concat(forms);
    state.mockN++;
    state.mock = { id: state.mockN, qs: shuffle(wrong.concat(g, vPick)), start: Date.now(), n: 0, elapsed: null };
  }
  var MOCK_TARGET = 20 * 22 * 1000; // 850 목표: 문항당 22초 → 7분 20초

  // ===== 통계 =====
  function stats() {
    var v = state.progress.vocab, known = 0, fuzzy = 0, unknown = 0;
    Object.keys(v).forEach(function (k) {
      var s = v[k].s;
      if (s === "known") known++; else if (s === "fuzzy") fuzzy++; else if (s === "unknown") unknown++;
    });
    var first = state.progress.quiz.first, ids = Object.keys(first), fc = 0;
    ids.forEach(function (k) { fc += first[k]; });
    var rate = ids.length ? Math.round((fc / ids.length) * 100) : 0;
    var t = state.progress.quiz.days[today()] || { solved: 0, correct: 0 };
    var wr = state.progress.wrong, wrongN = 0, gradDue = 0;
    Object.keys(wr).forEach(function (id) {
      if (id.indexOf("v:") === 0) return;
      if (!wr[id].grad) wrongN++;
      else if (daysSince(wr[id].grad) >= 14) gradDue++;
    });
    var rusty = rustyWords().length;
    return { known: known, fuzzy: fuzzy, unknown: unknown, rate: rate, firstN: ids.length, today: t, wrongN: wrongN, gradDue: gradDue, rusty: rusty, due: fuzzy + unknown };
  }

  // ===== 기록 =====
  function recordAnswer(qid, ok) {
    var q = state.progress.quiz, d = today();
    var day = q.days[d] || { solved: 0, correct: 0 };
    q.days[d] = { solved: day.solved + 1, correct: day.correct + (ok ? 1 : 0) };
    q.total = { solved: q.total.solved + 1, correct: q.total.correct + (ok ? 1 : 0) };
    if (q.first[qid] === undefined) q.first[qid] = ok ? 1 : 0;
    if (qid.indexOf("v:") !== 0) { // 문법·독해는 오답노트 적재 (어휘 오답은 단어 상태로 순환)
      var wr = state.progress.wrong, e = wr[qid];
      if (!ok) wr[qid] = { n: (e ? e.n : 0) + 1, last: d, streak: 0 }; // 졸업했더라도 틀리면 즉시 복귀
      else if (e) {
        if (e.grad) delete wr[qid]; // 졸업 후 재검증 통과 → 완전 졸업
        else { e.streak = (e.streak || 0) + 1; if (e.streak >= 2) { e.grad = d; e.streak = 0; } wr[qid] = e; }
      }
    }
    saveNow();
  }
  function vocabQuizResult(word, ok) {
    var v = state.progress.vocab, e = v[word] || {};
    if (!ok) {
      var down = e.s === "known" ? "fuzzy" : "unknown";
      v[word] = { s: down, t: today(), q: 0 };
    } else if (e.s === "known") {
      // 이미 '안다' 단어: 정답 1회로 검증 갱신, 재검증 통과면 주기 연장
      var iv = e.iv || 7;
      v[word] = { s: "known", t: today(), q: 0, iv: isRusty(word) ? nextIv(iv) : iv };
    } else {
      var streak = (e.q || 0) + 1;
      if (streak >= 2) {
        var up = e.s === "unknown" ? "fuzzy" : "known";
        v[word] = up === "known" ? { s: "known", t: today(), q: 0, iv: 7 } : { s: up, t: today(), q: 0 };
      } else {
        v[word] = { s: e.s, t: e.t || today(), q: streak };
      }
    }
  }
  function mark(word, status) {
    var v = state.progress.vocab, e = v[word];
    var prev = e ? { s: e.s, t: e.t, q: e.q, iv: e.iv } : null;
    if (status === "known" && e && e.s === "known") {
      // 이미 '안다' 단어의 재확인: 삭제 토글 대신 검증 갱신. 재검증 대상이었다면 주기 연장(7→21→45일)
      var iv = e.iv || 7;
      v[word] = { s: "known", t: today(), q: 0, iv: isRusty(word) ? nextIv(iv) : iv };
    } else if (e && e.s === status) {
      delete v[word]; // 헷갈린다/모른다 재탭은 기존대로 해제
    } else if (status === "known") {
      v[word] = { s: "known", t: today(), q: 0, iv: (e && e.iv) || 7 };
    } else {
      v[word] = { s: status, t: today(), q: 0 };
    }
    var cur = v[word];
    state.lastMark = { w: word, prev: prev, msg: cur ? "→ " + STATUS[cur.s].label : "표시 해제" };
    saveNow();
  }

  var STATUS = {
    known: { label: "안다", cls: "known" },
    fuzzy: { label: "헷갈린다", cls: "fuzzy" },
    unknown: { label: "모른다", cls: "unknown" },
  };

  // ===== 뷰 =====
  function view() { return header() + dashboard() + tabsView() + bodyView(); }

  function header() {
    return '<header class="hd">' +
      '<p class="mono eyebrow">Hackers TOEIC RC · 목표 850</p>' +
      '<h1 class="serif h1">토익 단어·문법 학습기</h1>' +
      '<p class="lead">모든 문제는 실전 Part 5 형식. 틀린 건 실전 세트와 복습 탭에서 다시 만나요.</p>' +
      '</header>';
  }

  function dashboard() {
    var s = stats();
    var right = state.confirm
      ? '<span class="confirm mono"><span class="cq">초기화할까요?</span>' +
        '<button class="cbtn yes" data-action="reset-yes">예</button>' +
        '<button class="cbtn no" data-action="reset-no">아니요</button></span>'
      : '<button class="reset mono" data-action="reset-ask">진도 초기화</button>';
    return '<section class="card dash">' +
      '<div class="dash-top"><span class="mono eyebrow amber">학습 현황</span>' + right + '</div>' +
      '<div class="stats">' +
        stat("외운 단어", s.known, "/ " + TOTAL_VOCAB, "em") +
        stat("정답률 · 첫 시도", s.rate + "%", s.firstN + "문제 기준", "amber") +
        stat("오늘 푼 문제", s.today.solved, "정답 " + s.today.correct, "t1") +
      '</div>' +
      '<div class="bar"><div class="bar-fill" style="width:' + s.rate + '%"></div></div>' +
      '<div class="io mono"><button class="iobtn" data-action="export">진도 내보내기</button>' +
        '<label class="iobtn" for="importFile">가져오기<input type="file" id="importFile" accept=".json,application/json" hidden></label>' +
        (state.importData ? '<span class="io-confirm">단어 ' + Object.keys(state.importData.vocab).length + '·오답 ' + Object.keys(state.importData.wrong).length + '건 발견 — 현재 진도를 덮어쓸까요? <button class="iobtn warn" data-action="import-yes">적용</button><button class="iobtn" data-action="import-no">취소</button></span>' : '') +
        (state.ioMsg ? '<span class="io-msg">' + esc(state.ioMsg) + '</span>' : '') + '</div>' +
      '<p class="mono note">' + (storageOK
        ? "이 기기에 자동 저장 · 복습 단어 " + s.due + "개 · 재검증 " + (s.rusty + s.gradDue) + "건 · 오답노트 " + s.wrongN + "문제"
        : "이 브라우저에서 저장이 막혀 있어 진도가 유지되지 않아요 (사파리 개인정보 보호 모드 등).") +
      '</p></section>';
  }
  function stat(label, value, sub, accent) {
    return '<div class="stat"><p class="mono lbl">' + esc(label) + '</p>' +
      '<p class="serif big ' + accent + '">' + esc(value) + '</p>' +
      '<p class="mono sub">' + esc(sub) + '</p></div>';
  }

  function tabsView() {
    var s = stats();
    var pending = s.wrongN + s.due + s.rusty + s.gradDue;
    var t = [["vocab", "단어"], ["grammar", "문법"], ["reading", "독해"], ["mock", "실전" + (state.mock && state.mock.elapsed === null ? " •" : "")], ["review", "복습" + (pending ? " · " + pending : "")]];
    return '<div class="tabs">' + t.map(function (x) {
      return '<button class="tab' + (state.tab === x[0] ? " active" : "") + '" aria-pressed="' + (state.tab === x[0]) + '" data-action="tab" data-tab="' + x[0] + '">' + esc(x[1]) + '</button>';
    }).join("") + '</div>';
  }

  function chips(list, currentId, action, pctFn) {
    return '<div class="chips" data-ck="' + escA(action) + '">' + list.map(function (c) {
      var on = c.id === currentId;
      var pct = pctFn ? pctFn(c) : null;
      var aria = pct === null ? "" : ' aria-label="' + escA(c.label + " " + c.title + " · 안정 문제 " + pct + "%") + '"';
      var bar = pct === null ? "" : '<span class="chipbar" aria-hidden="true"><span style="width:' + pct + '%"></span></span>';
      return '<button class="chip' + (on ? " active" : "") + '" aria-pressed="' + on + '"' + aria + ' data-action="' + action + '" data-id="' + c.id + '">' +
        '<span class="chip-l mono">' + esc(c.label) + '</span> ' + esc(c.title) + bar + '</button>';
    }).join("") + '</div>';
  }

  // 문법 챕터 진도: 안정 문제 비율 — 풀어본 문제 중 현재 오답노트에 없거나 졸업한 비율
  function gStablePct(c) {
    var first = state.progress.quiz.first, wr = state.progress.wrong, n = 0;
    c.data.q.forEach(function (q) {
      if (first[q.id] === undefined) return; // 미시도 = 미진행
      var e = wr[q.id];
      if (!e || e.grad) n++; // 활성 오답노트에 있으면 불안정
    });
    return Math.round((n / c.data.q.length) * 100);
  }

  function vchips() {
    var items = [{ id: "all", label: "ALL", title: "전체", words: ALL_VOCAB }].concat(VOCAB_CHAPTERS);
    return '<div class="chips" data-ck="vocab">' + items.map(function (c) {
      var known = 0;
      c.words.forEach(function (v) { if (vs(v.w) === "known") known++; });
      var pct = Math.round((known / c.words.length) * 100);
      var on = c.id === state.vc;
      return '<button class="chip' + (on ? " active" : "") + '" aria-pressed="' + on + '" aria-label="' + escA(c.label + " " + c.title + " · 외운 단어 " + pct + "%") + '" data-action="vchap" data-id="' + c.id + '">' +
        '<span class="chip-l mono">' + esc(c.label) + '</span> ' + esc(c.title) +
        '<span class="chipbar" aria-hidden="true"><span style="width:' + pct + '%"></span></span></button>';
    }).join("") + '</div>';
  }

  function bodyView() {
    if (state.tab === "vocab") return vocabTab();
    if (state.tab === "grammar") return grammarTab();
    if (state.tab === "reading") return readingTab();
    if (state.tab === "mock") return mockTab();
    return reviewTab();
  }

  // ---- 마킹 되돌리기 바 (카드가 목록에서 사라진 직후 복구 수단) ----
  function undoBar() {
    var lm = state.lastMark;
    if (!lm) return "";
    return '<div class="undobar mono"><span>“' + esc(lm.w) + '” ' + esc(lm.msg) + '</span>' +
      '<button class="minibtn" data-action="undo-mark">되돌리기</button></div>';
  }

  // ---- 해석 토글 (버튼을 눌러야 한국어 노출) ----
  function trBlock(key, tr) {
    if (!tr) return "";
    var open = !!state.trOpen[key];
    return '<span class="trbtn mono" data-action="tr" data-key="' + escA(key) + '">' + (open ? "해석 숨기기" : "해석 보기") + '</span>' +
      (open ? '<p class="trx">' + esc(tr) + '</p>' : "");
  }

  // ---- 단어 ----
  function vocabTab() {
    var all = state.vc === "all";
    var ch = all ? null : VOCAB_CHAPTERS.find(function (c) { return c.id === state.vc; });
    var h = vchips();
    h += '<div class="pills"><span class="seg">' +
      '<button class="segbtn' + (state.vmode === "cards" ? " active" : "") + '" aria-pressed="' + (state.vmode === "cards") + '" data-action="vmode" data-mode="cards">카드로 외우기</button>' +
      '<button class="segbtn' + (state.vmode === "quiz" ? " active" : "") + '" aria-pressed="' + (state.vmode === "quiz") + '" data-action="vmode" data-mode="quiz">문제 풀기</button></span>';
    if (state.vmode === "cards") {
      if (all) {
        var dueN = dueWords().length, rustyN = rustyWords().length;
        h += '<span class="mono chip-l right">복습 단어 ' + dueN + (rustyN ? ' · 재검증 ' + rustyN : '') + '</span>';
      } else {
        h += '<button class="minibtn right' + (state.review ? " on" : "") + '" aria-pressed="' + state.review + '" data-action="review">' + (state.review ? "복습 큐 보는 중" : "아직 못 외운 것만") + '</button>';
      }
    } else {
      h += '<button class="minibtn right" data-action="reseed">새 문제</button>';
    }
    h += '</div>';

    if (state.vmode === "cards") {
      h += undoBar();
      if (all) {
        var list = dueWords().concat(rustyWords());
        if (!list.length) {
          h += '<div class="empty">아직 복습할 단어가 없어요. 챕터 칩을 골라 카드를 훑거나, 바로 “문제 풀기”로 실력을 확인해 보세요 — 틀린 단어는 자동으로 여기에 쌓입니다.</div>';
        } else {
          h += '<div class="vgrid">' + list.map(function (v, i) { return vcard(v, i); }).join("") + '</div>';
        }
      } else {
        var words = ch.words;
        var cards = state.review ? words.filter(function (v) { var st = vs(v.w); return st === "unknown" || st === "fuzzy" || st === undefined; }) : words;
        if (!cards.length) {
          h += '<div class="empty">이 챕터에서 복습할 단어가 없어요. 전부 “안다”로 표시했네요! 👍</div>';
        } else {
          h += '<div class="vgrid">' + cards.map(function (v) { return vcard(v, words.indexOf(v)); }).join("") + '</div>';
        }
      }
    } else {
      var vqs = ensureVQuiz(); // quizId보다 먼저 생성해야 vgen이 확정됨
      var hasWF = vqs.some(function (q) { return q.id.indexOf("f:") === 0; });
      h += '<p class="mono note" style="margin-bottom:12px">' + (all ? "전 챕터 혼합" : esc(ch.label + " " + ch.title)) + (hasWF ? ' · 어휘 + 어형(품사) 혼합' : ' · 어휘 문제') + ' · 못 외운 단어가 먼저 나와요</p>';
      h += quizView("vq:" + state.vgen, vqs, {});
    }
    return '<section>' + h + '</section>';
  }

  // 콜로케이션·유의어 (카드 뒷면·오답 카드 공용)
  function csLines(w) {
    var cs = typeof CS !== "undefined" ? CS[w] : null;
    if (!cs) return "";
    var h = "";
    if (cs[0]) h += '<p class="vcs mono"><span class="vcs-l">함께</span>' + esc(cs[0]) + '</p>';
    if (cs[1]) h += '<p class="vcs mono"><span class="vcs-l">유의어</span>' + esc(cs[1]) + '</p>';
    return h;
  }

  function vcard(v, idx) {
    var st = vs(v.w);
    var meta = st ? STATUS[st] : null;
    var rusty = isRusty(v.w);
    var e = state.progress.vocab[v.w];
    var flipped = !!state.flips[v.w];
    var face = flipped
      ? '<p class="vmean">' + esc(v.m) + '</p>' +
        '<p class="vex">“' + esc(v.ex) + '”</p>' +
        trBlock("c:" + v.w, typeof TRS !== "undefined" ? TRS["v:" + v.w] : null) +
        '<p class="vtip mono">출제 포인트 · ' + esc(v.tip) + '</p>' +
        csLines(v.w)
      : '<p class="serif vword">' + esc(v.w) + '</p>' +
        '<p class="vpos mono">' + esc(v.p) + '</p>' +
        '<p class="vhint mono">눌러서 뜻 보기</p>';
    var marks = ["known", "fuzzy", "unknown"].map(function (k) {
      return '<button class="mark ' + STATUS[k].cls + (st === k ? " on" : "") + '" aria-pressed="' + (st === k) + '" data-action="mark" data-word="' + escA(v.w) + '" data-status="' + k + '">' + STATUS[k].label + '</button>';
    }).join("");
    return '<div class="vcard' + (meta ? " ring-" + meta.cls : "") + '">' +
      '<span class="vnum mono">' + String(idx + 1).padStart(2, "0") + '</span>' +
      (meta ? '<span class="vdot dot-' + meta.cls + '"></span>' : "") +
      '<button class="vface" data-action="flip" data-word="' + escA(v.w) + '">' + face + '</button>' +
      (rusty ? '<p class="vbadge mono">재검증 대상 · “안다” 표시 후 ' + daysSince(e.t) + '일 경과 — 뜻을 확인하고 아직 안다면 “안다”를 다시 누르세요 (주기 연장)</p>' : "") +
      '<div class="marks">' + marks + '</div></div>';
  }

  // ---- 문법 ----
  function grammarTab() {
    var ch = GRAMMAR_CHAPTERS.find(function (c) { return c.id === state.gc; });
    var d = ch.data;
    var h = chips(GRAMMAR_CHAPTERS, state.gc, "gchap", gStablePct);
    h += '<div class="rules">' + d.rules.map(function (r, i) {
      var key = ch.id + "-" + i;
      var open = !!state.open[key];
      return '<div class="rule">' +
        '<button class="rule-h" data-action="rule" data-key="' + key + '">' +
          '<span class="rnum mono">' + (i + 1) + '</span>' +
          '<span class="rt">' + esc(r.t) + '</span>' +
          '<span class="rtoggle mono">' + (open ? "−" : "+") + '</span></button>' +
        (open ? '<div class="rule-b"><p class="rb">' + esc(r.b) + '</p><p class="rex mono">' + esc(r.ex) + '</p></div>' : "") +
        '</div>';
    }).join("") + '</div>';
    h += '<h3 class="serif h3">실전 문제 (Part 5)</h3>';
    h += quizView("gq:" + ch.id, d.q, { links: true });
    return '<section>' + h + '</section>';
  }

  // ---- 독해 ----
  function readingTab() {
    var h = '<div class="card note-card"><p class="tip-title">Part 6 단어 고르기 전략</p>' +
      '<p class="tip-body">빈칸 문장만으로 답이 안 나오면 주변 문맥에서 단서를 찾으세요. 시제는 앞뒤 동사·날짜로, 대명사는 앞 문장이 가리키는 대상으로, 접속부사는 앞뒤 문장의 의미 관계로, 어휘는 빈칸 주변 단어로 판단합니다.</p></div>';
    READING.forEach(function (psg, i) {
      h += '<div class="passage"><h3 class="serif h3">' + esc(psg.title) + '</h3>' +
        '<div class="card ptext">' + psg.lines.map(function (l) { return '<p>' + esc(l) + '</p>'; }).join("") + '</div>' +
        quizView("rq:" + i, psg.q, { links: true }) + '</div>';
    });
    return '<section class="reading">' + h + '</section>';
  }

  // ---- 실전 세트 ----
  function mockTab() {
    var m = state.mock;
    if (!m) {
      var s = stats();
      return '<section class="reading">' +
        '<div class="card note-card"><p class="tip-title">실전 세트 · 20문제</p>' +
        '<p class="tip-body">문법과 어휘를 섞은 랜덤 20문제를 실전처럼 풉니다. 오답노트에 쌓인 문제' + (s.wrongN ? "(" + s.wrongN + "개 대기 중)" : "") + '가 우선 편성되고, 못 외운 단어가 먼저 출제돼요.</p>' +
        '<p class="tip-body">목표 페이스는 <b>7분 20초</b> — 850점 기준 Part 5 문항당 약 22초입니다. 다 풀면 페이스 판정과 함께 오답이 자동으로 복습 탭에 쌓여요.</p></div>' +
        '<button class="pill active" style="width:100%;text-align:center" data-action="mock-start">세트 시작</button>' +
        '</section>';
    }
    var qid = "mq:" + m.id;
    var solved = 0, correct = 0;
    m.qs.forEach(function (q, qi) {
      var p = state.answers[qid + ":" + qi];
      if (p !== undefined) { solved++; if (p === q.a) correct++; }
    });
    var done = solved === m.qs.length;
    var h = '<div class="card note-card mockbar">' +
      '<span class="mono">' + solved + ' / ' + m.qs.length + ' 문제</span>' +
      '<span class="mono amber" id="mtimer">' + fmtT(m.elapsed !== null ? m.elapsed : Date.now() - m.start) + '</span>' +
      '<span class="mono">목표 07:20</span></div>';
    if (done) {
      var overPace = m.elapsed > MOCK_TARGET;
      h += '<div class="card note-card"><p class="tip-title">결과 · ' + correct + ' / ' + m.qs.length + '</p>' +
        '<p class="tip-body">소요 시간 ' + fmtT(m.elapsed) + ' — ' +
        (overPace ? "목표보다 " + fmtT(m.elapsed - MOCK_TARGET) + " 느렸어요. 다음 세트는 확신이 없어도 22초 안에 결정하는 연습을 해보세요."
                  : "목표 페이스 안이에요! 이 속도면 실전 Part 5에서 시간이 남습니다.") + '</p>' +
        '<p class="tip-body">틀린 문법 문제는 오답노트로, 틀린 어휘는 복습 단어로 자동 이동했어요.</p>' +
        '<button class="pill active" style="width:100%;text-align:center;margin-top:8px" data-action="mock-start">새 세트 시작</button></div>';
    }
    h += quizView(qid, m.qs, { links: true, meta: true });
    return '<section class="reading">' + h + '</section>';
  }

  // ---- 복습 ----
  function reviewTab() {
    var due = dueWords(), rusty = rustyWords();
    var h = '<div class="card note-card"><p class="tip-title">복습</p>' +
      '<p class="tip-body">“모른다·헷갈린다” 단어와 틀렸던 문제를 한곳에 모았어요. “안다”가 된 단어도 7일이 지나면 재검증 대상으로 돌아오고(통과 시 21일→45일로 연장), 졸업한 오답 문제는 14일 뒤 실전 세트에 몰래 재투입돼 한 번 더 검증받습니다.</p></div>';

    h += '<h3 class="serif h3">복습 단어 · ' + due.length + '개' + (rusty.length ? ' <span class="mono" style="font-size:11px">+ 재검증 ' + rusty.length + '</span>' : '') + '</h3>';
    if (!due.length && !rusty.length && !state.rvq) {
      h += '<div class="empty">복습할 단어가 없어요. 카드에서 표시하거나 문제를 틀리면 여기에 쌓여요.</div>';
    } else {
      var picks = ensureRWords();
      h += '<div class="pills"><span class="mono chip-l">전 챕터에서 최대 10개</span><button class="minibtn right" data-action="rreseed">다시 뽑기</button></div>';
      h += undoBar();
      h += '<div class="vgrid">' + picks.map(function (v, i) { return vcard(v, i); }).join("") + '</div>';
      if (!due.length && !rusty.length) {
        // 검증 퀴즈 도중 큐를 모두 통과한 경우: 진행 중이던 화면을 지우지 않고 완주를 알림
        h += '<div class="empty" style="margin-top:12px">복습 큐를 모두 통과했어요! 🎉 아래 결과를 확인하고, “다시 뽑기”를 누르면 정리돼요.</div>';
      }
      // 카드로 훑은 바로 그 단어들로 즉시 검증 (카드→문제 연결 고리)
      h += '<button class="pill active" style="width:100%;text-align:center;margin-top:12px" data-action="rquiz">' +
        (state.rvq ? "이 단어들로 다시 출제" : "이 단어 " + picks.length + "개로 바로 문제 풀기") + '</button>';
      if (state.rvq) {
        h += '<p class="mono note" style="margin:12px 0">위 카드의 단어만 출제 · 정답이면 상태가 회복돼요 (2회 연속 정답 시 한 단계)</p>';
        h += quizView("rvq:" + state.rvgen, state.rvq, {});
      }
    }

    var qs = ensureWQuiz();
    h += '<h3 class="serif h3" style="margin-top:26px">오답노트 · ' + qs.length + '문제</h3>';
    if (!qs.length) {
      h += '<div class="empty">틀린 문제가 없어요. 문법·독해·실전 세트에서 틀리면 자동으로 모여요.</div>';
    } else {
      h += '<div class="pills"><span class="mono chip-l">2회 연속 정답 시 졸업</span><button class="minibtn right" data-action="wreseed">새로 섞기</button></div>';
      h += quizView("wq:" + state.wseed, qs, { links: true, meta: true });
    }
    return '<section class="reading">' + h + '</section>';
  }

  // ---- 공용 퀴즈 (Part 5 스타일) ----
  function quizView(quizId, questions, opts) {
    opts = opts || {};
    var solved = 0, correct = 0;
    questions.forEach(function (q, qi) {
      var p = state.answers[quizId + ":" + qi];
      if (p !== undefined) { solved++; if (p === q.a) correct++; }
    });
    var h = '<div class="qmeta mono"><span>' + solved + " / " + questions.length + ' 풀이 (이번 세트)</span><span class="amber">정답 ' + correct + "</span></div>";
    h += '<div class="qlist">';
    questions.forEach(function (q, qi) {
      var key = quizId + ":" + qi;
      var picked = state.answers[key];
      var done = picked !== undefined;
      h += '<div class="qcard">';
      if (opts.meta && q.meta) {
        var we = state.progress.wrong[q.id];
        h += '<p class="wmeta mono">' + esc(q.meta) + (we ? " · 오답 " + we.n + "회 (" + we.last + ")" : "") + '</p>';
      }
      h += '<p class="qtext"><span class="mono qn">Q' + (qi + 1) + "</span> " + esc(q.q) + "</p>";
      h += '<div class="opts">';
      q.o.forEach(function (opt, oi) {
        var cls = "opt";
        if (done) { if (oi === q.a) cls += " correct"; else if (oi === picked) cls += " wrong"; else cls += " dim"; }
        h += '<button class="' + cls + '"' + (done ? " disabled" : "") +
          ' data-action="answer" data-quiz="' + escA(quizId) + '" data-qi="' + qi + '" data-oi="' + oi + '" data-correct="' + q.a + '"' +
          ' data-qid="' + escA(q.id) + '"' + (q.w ? ' data-word="' + escA(q.w) + '"' : "") + '>' +
          '<span class="ol mono">(' + String.fromCharCode(65 + oi) + ")</span> " + esc(opt) + "</button>";
      });
      h += "</div>";
      if (done) {
        var vv = q.w && picked !== q.a ? VOCAB_MAP[q.w] : null;
        if (vv) {
          // 어휘 오답: 압축 해설 대신 그 단어의 카드를 즉석에서 펼쳐 학습 순간으로 전환
          h += '<p class="expl">오답 · 정답은 “' + esc(q.o[q.a]) + '” — 방금 틀린 단어예요. 지금 바로 외워 두세요.</p>';
          h += '<div class="qvcard">' +
            '<p class="serif qvw">' + esc(vv.w) + ' <span class="mono qvp">' + esc(vv.p) + '</span></p>' +
            '<p class="qvm">' + esc(vv.m) + '</p>' +
            '<p class="vtip mono">출제 포인트 · ' + esc(vv.tip) + '</p>' +
            csLines(vv.w) +
            '<p class="mono qvnote">복습 단어로 등재됨 · 2회 연속 정답이면 한 단계 회복</p></div>';
          h += trBlock(key, q.tr);
        } else {
          h += '<p class="expl">' + (picked === q.a ? "정답! " : "오답 · ") + esc(q.e) + "</p>";
          h += trBlock(key, q.tr);
        }
      }
      if (opts.links && done && Array.isArray(q.words)) {
        var linked = q.words.map(function (w) { return VOCAB_MAP[w]; }).filter(Boolean);
        if (linked.length) {
          h += '<div class="vchips">' + linked.map(function (v) { return '<span class="vchip mono">' + esc(v.w) + " · " + esc(v.m) + "</span>"; }).join("") + "</div>";
        }
      }
      h += "</div>";
    });
    h += "</div>";
    return h;
  }

  // ===== 렌더 =====
  var app = document.getElementById("app");

  // 진도 가져오기: 파일 파싱·검증 후 확인 단계로 전달 (즉시 덮어쓰지 않음)
  // 엔트리 단위 정화 — 겉 형식만 유효한 오염 파일이 stats()/렌더를 죽이고
  // localStorage에 저장돼 크래시 루프가 되는 것을 방지
  function sanitizeProgress(p) {
    var out = empty(), VS = { known: 1, fuzzy: 1, unknown: 1 };
    Object.keys(p.vocab || {}).forEach(function (w) {
      var e = p.vocab[w];
      if (!e || typeof e !== "object" || !VS[e.s] || !VOCAB_MAP[w]) return; // 미상 단어·불량 상태 제거
      var n = { s: e.s, t: typeof e.t === "string" ? e.t : today(), q: typeof e.q === "number" ? e.q : 0 };
      if (e.s === "known") n.iv = typeof e.iv === "number" && e.iv > 0 ? e.iv : 7;
      out.vocab[w] = n;
    });
    var f = (p.quiz && p.quiz.first) || {};
    Object.keys(f).forEach(function (id) { if (f[id] === 0 || f[id] === 1) out.quiz.first[id] = f[id]; });
    var d = (p.quiz && p.quiz.days) || {};
    Object.keys(d).forEach(function (k) {
      var x = d[k];
      if (x && typeof x.solved === "number" && typeof x.correct === "number") out.quiz.days[k] = { solved: x.solved, correct: x.correct };
    });
    var tt = p.quiz && p.quiz.total;
    out.quiz.total = {
      solved: tt && typeof tt.solved === "number" ? tt.solved : 0,
      correct: tt && typeof tt.correct === "number" ? tt.correct : 0
    };
    Object.keys(p.wrong || {}).forEach(function (id) {
      var e = p.wrong[id];
      if (!e || typeof e !== "object" || typeof e.n !== "number" || !QMAP[id]) return; // 미상 문제 ID 제거
      var n = { n: e.n, last: typeof e.last === "string" ? e.last : today(), streak: typeof e.streak === "number" ? e.streak : 0 };
      if (typeof e.grad === "string") n.grad = e.grad;
      out.wrong[id] = n;
    });
    return out;
  }
  function parseImport(text) {
    try {
      var obj = JSON.parse(text);
      var p = obj && obj.progress ? obj.progress : obj; // 직접 내보낸 파일·순수 progress 모두 허용
      if (!p || typeof p !== "object" || !p.vocab || !p.quiz || !p.wrong || !p.quiz.first || !p.quiz.days || !p.quiz.total) {
        state.ioMsg = "형식이 맞지 않는 파일이에요"; state.importData = null; return;
      }
      state.importData = sanitizeProgress(p);
      state.ioMsg = null;
    } catch (err) { state.ioMsg = "파일을 읽지 못했어요: " + err.message; state.importData = null; }
    render();
  }
  app.addEventListener("change", function (ev) {
    var t = ev.target;
    if (!t || t.id !== "importFile" || !t.files || !t.files[0]) return;
    var reader = new FileReader();
    reader.onload = function () { parseImport(String(reader.result)); };
    reader.onerror = function () { state.ioMsg = "파일을 읽지 못했어요"; render(); };
    reader.readAsText(t.files[0]);
  });

  function render() {
    // 탭 전환 = 새 맥락 → 최상단 복귀 / 그 외 액션 = 제자리 유지 (화면 점프 방지)
    var y = state._toTop ? 0 : window.scrollY;
    state._toTop = false;
    app.innerHTML = view();
    window.scrollTo(0, y);
  }

  // 실전 세트 타이머 (전체 렌더 없이 초 단위 갱신)
  setInterval(function () {
    if (!state.mock || state.mock.elapsed !== null) return;
    var el = document.getElementById("mtimer");
    if (el) el.textContent = fmtT(Date.now() - state.mock.start);
  }, 1000);

  // ===== 이벤트 위임 =====
  app.addEventListener("click", function (e) {
    var el = e.target.closest("[data-action]");
    if (!el) return;
    var a = el.dataset.action;
    // 마킹 직후가 아니면 되돌리기 바 해제 (카드 뒤집기·해석 토글은 유지)
    if (a !== "mark" && a !== "undo-mark" && a !== "flip" && a !== "tr") state.lastMark = null;
    if (a === "tab") {
      state.tab = el.dataset.tab;
      state.ioMsg = null;
      state._toTop = true; // 새 맥락은 항상 맨 위에서 시작
      // 복습 탭 재진입 시 카드 목록을 최신 풀에서 다시 추출 (검증 퀴즈 진행 중이면 유지)
      if (state.tab === "review" && !state.rvq) state.rqKey = null;
    }
    else if (a === "vchap") { state.vc = el.dataset.id; state.review = false; }
    else if (a === "gchap") state.gc = el.dataset.id;
    else if (a === "vmode") state.vmode = el.dataset.mode;
    else if (a === "review") state.review = !state.review;
    else if (a === "reseed") state.seed++;
    else if (a === "rreseed") { state.rseed++; state.rvq = null; }
    else if (a === "rquiz") { state.rvq = ensureRWords().map(vocabQ).filter(Boolean); state.rvgen++; }
    else if (a === "wreseed") state.wseed++;
    else if (a === "tr") { var k = el.dataset.key; state.trOpen[k] = !state.trOpen[k]; }
    else if (a === "flip") { var w = el.dataset.word; state.flips[w] = !state.flips[w]; }
    else if (a === "mark") mark(el.dataset.word, el.dataset.status);
    else if (a === "export") {
      try {
        var payload = JSON.stringify({ app: "toeic-trainer", exported: today(), progress: state.progress });
        var blob = new Blob([payload], { type: "application/json" });
        var url = URL.createObjectURL(blob);
        var link = document.createElement("a");
        link.href = url; link.download = "toeic-progress-" + today() + ".json";
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
        setTimeout(function () { URL.revokeObjectURL(url); }, 5000);
        state.ioMsg = "내보냈어요 — 파일을 안전한 곳에 보관하세요";
      } catch (err) { state.ioMsg = "내보내기 실패: " + err.message; }
    }
    else if (a === "import-yes") {
      if (state.importData) {
        state.progress = state.importData;
        state.importData = null; state.ioMsg = "진도를 불러왔어요";
        state.answers = {}; state.vquizKey = null; state.wqKey = null; state.rqKey = null; state.rvq = null; state.mock = null; state.lastMark = null;
        saveNow();
      }
    }
    else if (a === "import-no") { state.importData = null; state.ioMsg = null; }
    else if (a === "undo-mark") {
      var lm = state.lastMark;
      if (lm) {
        if (lm.prev) state.progress.vocab[lm.w] = { s: lm.prev.s, t: lm.prev.t, q: lm.prev.q, iv: lm.prev.iv };
        else delete state.progress.vocab[lm.w];
        state.lastMark = null; saveNow();
      }
    }
    else if (a === "rule") { var rk = el.dataset.key; state.open[rk] = !state.open[rk]; }
    else if (a === "mock-start") startMock();
    else if (a === "answer") {
      var key = el.dataset.quiz + ":" + el.dataset.qi;
      if (state.answers[key] !== undefined) return;
      var oi = +el.dataset.oi, ok = oi === +el.dataset.correct;
      state.answers[key] = oi;
      if (el.dataset.word) vocabQuizResult(el.dataset.word, ok);
      recordAnswer(el.dataset.qid, ok);
      if (state.mock && el.dataset.quiz === "mq:" + state.mock.id) {
        state.mock.n++;
        if (state.mock.n === state.mock.qs.length) state.mock.elapsed = Date.now() - state.mock.start;
      }
    }
    else if (a === "reset-ask") state.confirm = true;
    else if (a === "reset-no") state.confirm = false;
    else if (a === "reset-yes") {
      state.progress = empty(); state.answers = {}; state.flips = {}; state.trOpen = {};
      state.vc = "all"; state.gc = "g1"; state.vmode = "cards"; state.review = false; state.lastMark = null;
      state.vquizKey = null; state.wqKey = null; state.rqKey = null; state.mock = null; state.rvq = null;
      saveNow(); state.confirm = false;
    }
    render();
  });

  render();
})();

</script>
</body>
</html>
