<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0c0a09">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="토익 학습기">
<meta name="format-detection" content="telephone=no">
<title>토익 단어·문법 학습기</title>
<style>
:root{
  --bg:#0c0a09; --surface:#1c1917; --inner:#0c0a09; --border:#292524; --border2:#44403c;
  --t1:#f5f5f4; --t2:#a8a29e; --t3:#78716c; --t4:#57534e;
  --amber:#f59e0b; --amber-l:#fcd34d;
  --em:#34d399; --em-l:#6ee7b7; --em-bg:rgba(6,78,59,.5); --em-bd:#065f46;
  --ro:#fb7185; --ro-l:#fda4af; --ro-bg:rgba(76,5,25,.5); --ro-bd:#9f1239;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{
  margin:0; background:var(--bg); color:var(--t1);
  font-family:-apple-system,BlinkMacSystemFont,system-ui,"Segoe UI",Roboto,sans-serif;
  font-size:16px; line-height:1.55; overflow-wrap:break-word;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}
.wrap{max-width:480px; margin:0 auto; padding:18px 16px 48px}
.serif{font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif}
.mono{font-family:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace}
button{font-family:inherit; color:inherit; background:none; border:none; cursor:pointer; touch-action:manipulation; font-size:16px}
p{margin:0}

.amber{color:var(--amber-l)} .em{color:var(--em-l)} .t1{color:var(--t1)}
.eyebrow{font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--t3)}
.eyebrow.amber{color:rgba(245,158,11,.85)}

/* header */
.hd{margin-bottom:16px}
.h1{margin:4px 0 0; font-size:26px; font-weight:700; color:#fafaf9}
.lead{margin-top:8px; font-size:14px; color:var(--t2)}

/* card */
.card{border:1px solid var(--border); background:var(--surface); border-radius:14px}

/* dashboard */
.dash{padding:14px; margin-bottom:18px}
.dash-top{display:flex; align-items:center; justify-content:space-between; margin-bottom:12px}
.reset{font-size:11px; color:var(--t4)}
.reset:active{color:var(--t2)}
.confirm{display:flex; align-items:center; gap:8px; font-size:11px}
.cq{color:var(--t2)}
.cbtn{font-size:11px; padding:3px 9px; border-radius:6px}
.cbtn.yes{background:#7f1d1d; color:var(--ro-l)}
.cbtn.no{background:var(--border); color:var(--t2)}
.stats{display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px}
.stat{background:var(--inner); border-radius:10px; padding:10px 8px}
.lbl{font-size:11px; color:var(--t3)}
.big{margin-top:3px; font-size:22px; font-weight:700; line-height:1.1}
.sub{margin-top:2px; font-size:11px; color:var(--t4)}
.bar{margin-top:12px; height:6px; width:100%; background:var(--border); border-radius:99px; overflow:hidden}
.bar-fill{height:100%; background:var(--amber); border-radius:99px; transition:width .3s}
.note{margin-top:12px; font-size:11px; color:var(--t4)}

/* tabs */
.tabs{display:flex; gap:8px; margin-bottom:14px}
.tab{flex:0 0 auto; padding:8px 14px; min-height:40px; border-radius:10px; font-size:14px; font-weight:600; background:var(--surface); color:var(--t2)}
.tab.active{background:#f5f5f4; color:#0c0a09}

/* chips (가로 스크롤) */
.chips{display:flex; gap:8px; overflow-x:auto; padding-bottom:6px; margin-bottom:14px; -webkit-overflow-scrolling:touch; scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto; display:flex; align-items:center; gap:6px; padding:8px 12px; min-height:40px; border:1px solid var(--border); background:var(--surface); border-radius:10px; color:var(--t2); font-size:14px; font-weight:500; white-space:nowrap}
.chip.active{border-color:#b45309; background:rgba(245,158,11,.1); color:var(--amber-l)}
.chip-l{font-size:11px; color:var(--t3)}

/* pills */
.pills{display:flex; align-items:center; gap:8px; margin-bottom:14px; flex-wrap:wrap}
.pill{padding:8px 12px; min-height:38px; border-radius:8px; font-size:14px; font-weight:500; background:var(--border); color:var(--t2)}
.pill.active{background:var(--amber); color:#0c0a09}
.minibtn{padding:7px 12px; min-height:36px; border-radius:8px; font-size:12px; background:var(--border); color:var(--t3); font-family:ui-monospace,Menlo,monospace}
.minibtn.right{margin-left:auto}
.minibtn.on{background:#7f1d1d; color:var(--ro-l)}

/* vocab cards */
.vgrid{display:flex; flex-direction:column; gap:12px}
.vcard{position:relative; border:1px solid var(--border); background:var(--surface); border-radius:14px; padding:14px}
.vcard.ring-known{border-color:rgba(4,120,87,.6)}
.vcard.ring-fuzzy{border-color:rgba(180,83,9,.6)}
.vcard.ring-unknown{border-color:rgba(159,18,57,.6)}
.vnum{position:absolute; right:12px; top:12px; font-size:11px; color:var(--t4)}
.vdot{position:absolute; left:12px; top:14px; width:8px; height:8px; border-radius:99px}
.dot-known{background:var(--em)} .dot-fuzzy{background:var(--amber)} .dot-unknown{background:var(--ro)}
.vface{display:block; width:100%; text-align:left; padding:6px 0 2px; min-height:96px}
.vword{font-size:24px; font-weight:600; color:#fafaf9; line-height:1.15; padding-right:24px}
.vpos{margin-top:4px; font-size:11px; color:var(--t3)}
.vhint{margin-top:10px; font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:rgba(245,158,11,.7)}
.vmean{font-size:18px; font-weight:500; color:var(--amber-l)}
.vex{margin-top:8px; font-size:14px; font-style:italic; color:var(--t2); line-height:1.45}
.vtip{margin-top:8px; font-size:12px; color:var(--t2); background:var(--inner); border-radius:8px; padding:6px 8px}
.marks{display:flex; gap:6px; margin-top:12px}
.mark{flex:1; padding:9px 4px; min-height:40px; border-radius:8px; font-size:12px; background:var(--border); color:var(--t3); font-family:ui-monospace,Menlo,monospace}
.mark.known.on{background:#064e3b; color:var(--em-l)}
.mark.fuzzy.on{background:#78350f; color:var(--amber-l)}
.mark.unknown.on{background:#7f1d1d; color:var(--ro-l)}

.empty{border:1px solid var(--border); background:var(--surface); border-radius:14px; padding:28px 16px; text-align:center; font-size:14px; color:var(--t2)}

/* rules */
.rules{display:flex; flex-direction:column; gap:8px; margin-bottom:22px}
.rule{border:1px solid var(--border); background:var(--surface); border-radius:14px; overflow:hidden}
.rule-h{display:flex; align-items:center; gap:12px; width:100%; text-align:left; padding:12px 14px; min-height:52px}
.rnum{flex:0 0 auto; width:28px; height:28px; display:flex; align-items:center; justify-content:center; border-radius:8px; background:var(--amber); color:#0c0a09; font-size:14px; font-weight:700}
.rt{flex:1; font-size:14px; font-weight:500}
.rtoggle{color:var(--t3); font-size:16px}
.rule-b{border-top:1px solid var(--border); padding:12px 14px}
.rb{font-size:14px; color:var(--t2); line-height:1.55}
.rex{margin-top:8px; font-size:12px; color:rgba(253,230,138,.9); background:var(--inner); border-radius:8px; padding:8px 10px; line-height:1.5}
.h3{margin:0 0 12px; font-size:18px; font-weight:600}

/* quiz */
.qmeta{display:flex; justify-content:space-between; font-size:12px; color:var(--t3); margin-bottom:12px}
.qlist{display:flex; flex-direction:column; gap:12px}
.qcard{border:1px solid var(--border); background:var(--surface); border-radius:14px; padding:14px}
.qtext{font-size:15px; font-weight:500; line-height:1.55; color:var(--t1)}
.qn{margin-right:8px; font-size:12px; color:var(--t3)}
.opts{display:flex; flex-direction:column; gap:8px; margin-top:12px}
.opt{display:block; width:100%; text-align:left; border:1px solid var(--border2); background:var(--border); color:var(--t1); border-radius:10px; padding:11px 12px; min-height:44px; font-size:14px; line-height:1.4}
.opt .ol{margin-right:8px; font-size:12px; color:var(--t3)}
.opt.correct{border-color:#059669; background:var(--em-bg); color:var(--em-l)}
.opt.wrong{border-color:var(--ro-bd); background:var(--ro-bg); color:var(--ro-l)}
.opt.dim{border-color:var(--border); background:var(--surface); color:var(--t4)}
.expl{margin-top:12px; border:1px solid var(--border); background:var(--inner); border-radius:10px; padding:10px 12px; font-size:14px; line-height:1.55; color:var(--t2)}
.vchips{display:flex; flex-wrap:wrap; gap:8px; margin-top:10px}
.vchip{background:var(--border); border-radius:8px; padding:6px 8px; font-size:12px; color:rgba(253,230,138,.9)}

/* reading */
.reading{display:flex; flex-direction:column; gap:26px}
.note-card{padding:14px}
.tip-title{font-size:14px; font-weight:500; color:var(--amber-l)}
.tip-body{margin-top:8px; font-size:14px; color:var(--t2); line-height:1.55}
.passage .ptext{padding:14px; font-size:14px; line-height:1.6; color:#e7e5e4; margin-bottom:14px}
.passage .ptext p{margin-bottom:8px}
.passage .ptext p:last-child{margin-bottom:0}

footer{margin-top:36px; text-align:center; font-size:11px; color:var(--t4); font-family:ui-monospace,Menlo,monospace}
</style>
</head>
<body>
<div class="wrap">
  <div id="app"></div>
  <footer>업로드한 교재를 바탕으로 재구성한 개인 학습용 콘텐츠</footer>
</div>
<script>
const VOCAB_V1 = [
  { w: "determine", p: "동사", m: "알아내다, 결정하다", ex: "A survey can help the company determine customer needs.", tip: "decide와 의미가 비슷" },
  { w: "withdraw", p: "동사", m: "물러나다, 인출하다", ex: "She had to withdraw from the negotiation due to illness.", tip: "withdraw from: ~에서 빠지다" },
  { w: "anticipate", p: "동사", m: "예상하다, 기대하다", ex: "Managers anticipate strong demand next quarter.", tip: "expect와 의미가 같음" },
  { w: "monitor", p: "동사", m: "관찰하다, 감시하다", ex: "The team monitors social media trends closely.", tip: "'감시 장치'라는 명사로도 쓰임" },
  { w: "analyze", p: "동사", m: "분석하다", ex: "Analysts carefully analyzed the quarterly sales data.", tip: "명사 analysis, 사람 analyst" },
  { w: "surpass", p: "동사", m: "뛰어넘다, 능가하다", ex: "Sales surpassed the annual goal this year.", tip: "exceed와 의미가 비슷" },
  { w: "explore", p: "동사", m: "탐구하다, 알아보다", ex: "The board will explore new market options.", tip: "명사 exploration" },
  { w: "name", p: "동사", m: "임명하다, 지명하다", ex: "The CEO will name a successor next week.", tip: "appoint와 유사 / name A (as) B" },
  { w: "redeem", p: "동사", m: "(상품·현금으로) 교환하다", ex: "Points can be redeemed for store products.", tip: "be redeemed for A" },
  { w: "excel", p: "동사", m: "뛰어나다, 잘하다", ex: "She excels at analyzing research data.", tip: "excel at/in A" },
  { w: "optimize", p: "동사", m: "최적화하다", ex: "The update optimizes the security system.", tip: "형용사 optimal" },
  { w: "differ", p: "동사", m: "다르다", ex: "The new model differs from earlier versions.", tip: "differ from: ~과 다르다" },
  { w: "conform", p: "동사", m: "(규정에) 따르다, 일치하다", ex: "The café renovated its patio to conform to new rules.", tip: "conform to/with A" },
  { w: "resolve", p: "동사", m: "(문제를) 해결하다", ex: "The technician resolved the printer issue quickly.", tip: "명사 resolution" },
  { w: "suspend", p: "동사", m: "중단하다, 정지하다", ex: "The project was suspended until funding is secured.", tip: "명사 suspension" },
  { w: "resume", p: "동사", m: "재개하다, 다시 시작하다", ex: "The seminar will resume after a short break.", tip: "cf. résumé(이력서)와 철자 유사" },
  { w: "extend", p: "동사", m: "연장하다, 늘이다", ex: "The manager extended the deadline by a week.", tip: "extend an invitation: 초대하다 / 명사 extension" },
  { w: "commence", p: "동사", m: "시작되다, 개시하다", ex: "The board meeting commenced with a sales review.", tip: "initiate와 의미가 같음" },
  { w: "specify", p: "동사", m: "구체적으로 명시하다", ex: "Please specify your payment method on the form.", tip: "형용사 specific" },
  { w: "commend", p: "동사", m: "칭찬하다, 추천하다", ex: "Her supervisor commended her on the presentation.", tip: "commend A on/for B" },
  { w: "consult", p: "동사", m: "상담하다, 참조하다", ex: "Operators may consult the technicians for tips.", tip: "consult + 사람 / consult + 자료" },
  { w: "reserve", p: "동사", m: "예약하다, 보유하다", ex: "Attendees must reserve their own accommodations.", tip: "명사 reservation" },
  { w: "deliberate", p: "동사", m: "심사숙고하다, 심의하다", ex: "The board deliberated over the merger all afternoon.", tip: "'신중한'이라는 형용사로도 쓰임" },
  { w: "exceed", p: "동사", m: "(수·양)을 넘다, 초과하다", ex: "Carry-on baggage must not exceed 10 kilograms.", tip: "명사 excess" },
  { w: "address", p: "동사", m: "다루다, 제기하다", ex: "Officials will address the recent benefit changes.", tip: "address issues / '주소, 연설'의 명사로도 쓰임" },
  { w: "represent", p: "동사", m: "나타내다, 의미하다", ex: "These figures represent a rise in profits.", tip: "명사 representative(대표)" },
  { w: "retain", p: "동사", m: "유지하다, 보관하다", ex: "Developers must retain the historic features.", tip: "maintain과 의미가 같음" },
  { w: "hesitate", p: "동사", m: "주저하다", ex: "Do not hesitate to contact our staff for help.", tip: "do not hesitate to + 동사원형" },
  { w: "relocate", p: "동사", m: "(회사·주민 등이) 이전하다", ex: "The firm announced plans to relocate its office.", tip: "move와 유사 / 명사 relocation" },
  { w: "accommodate", p: "동사", m: "수용하다, 부응하다", ex: "The rooms can accommodate up to seven guests.", tip: "accommodate guests / demand" },
  { w: "implement", p: "동사", m: "시행하다, 이행하다", ex: "The company implemented an updated policy.", tip: "carry out과 의미가 같음" },
  { w: "indicate", p: "동사", m: "보여주다, 나타내다", ex: "Research indicates a link between performance and satisfaction.", tip: "명사 indication" },
  { w: "undergo", p: "동사", m: "겪다, 받다", ex: "The firm will undergo structural changes.", tip: "undergo transitions: 변화를 겪다" },
  { w: "assure", p: "동사", m: "~라고 확실히 말하다, 보장하다", ex: "The chair assured investors the value would hold.", tip: "assure A that / 명사 assurance" },
  { w: "waive", p: "동사", m: "적용하지 않다, 면제하다", ex: "The bank will waive fees for premium account holders.", tip: "명사 waiver" },
];
const VOCAB_V2 = [
  { w: "objective", p: "명사", m: "목표, 목적", ex: "The main objective this quarter is to expand overseas.", tip: "형용사 '객관적인'으로도 / object(물건)와 구별" },
  { w: "precaution", p: "명사", m: "조심, 예방 조치", ex: "Workers must take precautions when handling chemicals.", tip: "take precautions: 예방 조치를 취하다" },
  { w: "output", p: "명사", m: "생산(량)", ex: "The factory doubled its output after upgrading machines.", tip: "input(투입)의 반대 개념" },
  { w: "dimension", p: "명사", m: "치수, 크기", ex: "Please check the dimensions of the box before shipping.", tip: "'차원'이라는 의미로도 쓰임" },
  { w: "conflict", p: "명사", m: "갈등, 충돌", ex: "A scheduling conflict forced them to postpone the meeting.", tip: "a conflict between A and B" },
  { w: "influx", p: "명사", m: "쇄도, 유입", ex: "The city saw a huge influx of tourists during the festival.", tip: "an influx of: (사람·물건)의 쇄도" },
  { w: "presence", p: "명사", m: "존재(감), 영향력", ex: "The brand has a strong presence in the Asian market.", tip: "반의어 absence / '참석'의 뜻도" },
  { w: "reduction", p: "명사", m: "인하, 감소", ex: "The store announced a price reduction on winter items.", tip: "동사 reduce: 감소시키다" },
  { w: "access", p: "명사", m: "접근(권), 이용 권한", ex: "Only authorized staff have access to the server room.", tip: "access to A: A로의 접근" },
  { w: "proximity", p: "명사", m: "근접함, 가까움", ex: "The hotel's proximity to the airport makes it convenient.", tip: "proximity to: ~에 가까움" },
  { w: "authority", p: "명사", m: "권위자, 권한", ex: "She is a leading authority on international trade law.", tip: "복수형 authorities: 당국 / authorization과 구별" },
  { w: "dedication", p: "명사", m: "전념, 헌신", ex: "His dedication to service earned him a promotion.", tip: "dedication to: ~에 대한 전념" },
  { w: "adjustment", p: "명사", m: "조정, 수정", ex: "A few minor adjustments to the schedule solved it.", tip: "make adjustments to: ~을 조정하다" },
  { w: "distribution", p: "명사", m: "배포, 분배, 유통", ex: "The firm handles the distribution of goods nationwide.", tip: "동사 distribute: 유통시키다" },
  { w: "shift", p: "명사", m: "전환, 이동, 교대 근무", ex: "There has been a noticeable shift toward remote work.", tip: "'교대 근무(시간)'로도 쓰임" },
  { w: "priority", p: "명사", m: "우선 사항, 우선권", ex: "Improving safety is the company's top priority.", tip: "top priority: 최우선 사항" },
  { w: "estimate", p: "명사", m: "견적, 추정", ex: "The contractor provided an estimate for the renovation.", tip: "make an estimate / 동사로도 쓰임" },
  { w: "recognition", p: "명사", m: "인정, 표창", ex: "The award was given in recognition of her research.", tip: "in recognition of: ~을 인정하여" },
  { w: "disclosure", p: "명사", m: "공개, 폭로", ex: "Full disclosure of financial data builds investor trust.", tip: "동사 disclose: 공개하다" },
  { w: "permission", p: "명사", m: "허가, 허락, 승인", ex: "You need written permission to enter the laboratory.", tip: "permit(허가증)과 구별" },
  { w: "persistence", p: "명사", m: "끈기, 고집", ex: "Her persistence eventually won over the difficult client.", tip: "형용사 persistent: 끈질긴" },
  { w: "departure", p: "명사", m: "벗어남, 출발", ex: "The new album is a departure from her earlier style.", tip: "departure from: ~에서 벗어남 / 동사 depart" },
  { w: "initiative", p: "명사", m: "계획, 발안, 결단력", ex: "The city launched a new recycling initiative this year.", tip: "take initiative: 주도권을 잡다" },
  { w: "challenge", p: "명사", m: "과제, 문제, 도전", ex: "Meeting the deadline was the team's biggest challenge.", tip: "'요구하다'라는 동사로도 쓰임" },

  var storageOK = (function () { try { localStorage.setItem("__t", "1"); localStorage.removeItem("__t"); return true; } catch (e) { return false; } })();

  // ===== 상태 =====
  var state = {
    progress: loadProgress(),
    tab: "vocab",
    vc: "v1", gc: "g1",
    vmode: "cards", review: false, seed: 0,
    flips: {}, open: {}, answers: {},
    vquiz: null, vquizKey: null,
    confirm: false,
  };
  GRAMMAR_CHAPTERS.forEach(function (c) { state.open[c.id + "-0"] = true; });

  // ===== 유틸 =====
  function esc(s) { return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
  function escA(s) { return esc(s).replace(/"/g, "&quot;"); }
  function shuffle(a) { a = a.slice(); for (var i = a.length - 1; i > 0; i--) { var j = Math.floor(Math.random() * (i + 1)); var t = a[i]; a[i] = a[j]; a[j] = t; } return a; }

  function buildVocabQuiz(list) {
    var n = Math.min(12, list.length);
    return shuffle(list).slice(0, n).map(function (item) {
      var d = shuffle(list.filter(function (x) { return x.w !== item.w; })).slice(0, 3).map(function (x) { return x.m; });
      var opts = shuffle([item.m].concat(d));
      return { q: item.w, o: opts, a: opts.indexOf(item.m), e: item.w + ": " + item.m + " · " + item.tip };
    });
  }
  function ensureVQuiz() {
    var k = state.vc + ":" + state.seed;
    if (state.vquizKey !== k) {
      state.vquizKey = k;
      var ch = VOCAB_CHAPTERS.find(function (c) { return c.id === state.vc; });
      state.vquiz = buildVocabQuiz(ch.words);
    }
    return state.vquiz;
  }

  function stats() {
    var v = state.progress.vocab;
    var vals = Object.keys(v).map(function (k) { return v[k]; });
    var known = vals.filter(function (s) { return s === "known"; }).length;
    var fuzzy = vals.filter(function (s) { return s === "fuzzy"; }).length;
    var tot = state.progress.quiz.total;
    var rate = tot.solved ? Math.round((tot.correct / tot.solved) * 100) : 0;
    var t = state.progress.quiz.days[today()] || { solved: 0, correct: 0 };
    return { known: known, fuzzy: fuzzy, solved: tot.solved, correct: tot.correct, rate: rate, today: t };
  }

  function recordAnswer(ok) {
    var q = state.progress.quiz, d = today();
    var day = q.days[d] || { solved: 0, correct: 0 };
    q.days[d] = { solved: day.solved + 1, correct: day.correct + (ok ? 1 : 0) };
    q.total = { solved: q.total.solved + 1, correct: q.total.correct + (ok ? 1 : 0) };
    saveNow();
  }
  function mark(word, status) {
    var v = state.progress.vocab;
    if (v[word] === status) delete v[word]; else v[word] = status;
    saveNow();
  }

  var STATUS = {
    known: { label: "안다", cls: "known" },
    fuzzy: { label: "헷갈린다", cls: "fuzzy" },
    unknown: { label: "모른다", cls: "unknown" },
  };

  // ===== 뷰 =====
  function view() { return header() + dashboard() + tabsView() + bodyView(); }

  function header() {
    return '<header class="hd">' +
      '<p class="mono eyebrow">Hackers TOEIC RC · 어휘 &amp; 문법</p>' +
      '<h1 class="serif h1">토익 단어·문법 학습기</h1>' +
      '<p class="lead">챕터를 골라 외우고, 바로 풀어보세요. 진도는 이 기기에 자동 저장돼요.</p>' +
      '</header>';
  }

  function dashboard() {
    var s = stats();
    var right = state.confirm
      ? '<span class="confirm mono"><span class="cq">초기화할까요?</span>' +
        '<button class="cbtn yes" data-action="reset-yes">예</button>' +
        '<button class="cbtn no" data-action="reset-no">아니요</button></span>'
      : '<button class="reset mono" data-action="reset-ask">진도 초기화</button>';
    return '<section class="card dash">' +
      '<div class="dash-top"><span class="mono eyebrow amber">학습 현황</span>' + right + '</div>' +
      '<div class="stats">' +
        stat("외운 단어", s.known, "/ " + TOTAL_VOCAB, "em") +
        stat("누적 정답률", s.rate + "%", s.correct + "/" + s.solved, "amber") +
        stat("오늘 푼 문제", s.today.solved, "정답 " + s.today.correct, "t1") +
      '</div>' +
      '<div class="bar"><div class="bar-fill" style="width:' + s.rate + '%"></div></div>' +
      '<p class="mono note">' + (storageOK
        ? "진도는 이 기기에 자동 저장돼요 · 헷갈리는 단어 " + s.fuzzy + "개"
        : "이 브라우저에서 저장이 막혀 있어 진도가 유지되지 않아요 (사파리 개인정보 보호 모드 등).") +
      '</p></section>';
  }
  function stat(label, value, sub, accent) {
    return '<div class="stat"><p class="mono lbl">' + esc(label) + '</p>' +
      '<p class="serif big ' + accent + '">' + esc(value) + '</p>' +
      '<p class="mono sub">' + esc(sub) + '</p></div>';
  }

  function tabsView() {
    var t = [["vocab", "단어 · " + TOTAL_VOCAB], ["grammar", "문법 · " + GRAMMAR_CHAPTERS.length], ["reading", "독해 · Part 6"]];
    return '<div class="tabs">' + t.map(function (x) {
      return '<button class="tab' + (state.tab === x[0] ? " active" : "") + '" data-action="tab" data-tab="' + x[0] + '">' + esc(x[1]) + '</button>';
    }).join("") + '</div>';
  }

  function chips(list, currentId, action) {
    return '<div class="chips">' + list.map(function (c) {
      var on = c.id === currentId;
      return '<button class="chip' + (on ? " active" : "") + '" data-action="' + action + '" data-id="' + c.id + '">' +
        '<span class="chip-l mono">' + esc(c.label) + '</span> ' + esc(c.title) + '</button>';
    }).join("") + '</div>';
  }

  function bodyView() {
    if (state.tab === "vocab") return vocabTab();
    if (state.tab === "grammar") return grammarTab();
    return readingTab();
  }

  // ---- 단어 ----
  function vocabTab() {
    var ch = VOCAB_CHAPTERS.find(function (c) { return c.id === state.vc; });
    var h = chips(VOCAB_CHAPTERS, state.vc, "vchap");
    h += '<div class="pills">' +
      '<button class="pill' + (state.vmode === "cards" ? " active" : "") + '" data-action="vmode" data-mode="cards">카드로 외우기</button>' +
      '<button class="pill' + (state.vmode === "quiz" ? " active" : "") + '" data-action="vmode" data-mode="quiz">뜻 맞히기 퀴즈</button>';
    if (state.vmode === "cards") {
      h += '<button class="minibtn right' + (state.review ? " on" : "") + '" data-action="review">' + (state.review ? "복습 큐 보는 중" : "아직 못 외운 것만") + '</button>';
    } else {
      h += '<button class="minibtn right" data-action="reseed">새 문제</button>';
    }
    h += '</div>';

    if (state.vmode === "cards") {
      var words = ch.words;
      var cards = state.review ? words.filter(function (v) { var st = state.progress.vocab[v.w]; return st === "unknown" || st === "fuzzy" || st === undefined; }) : words;
      if (!cards.length) {
        h += '<div class="empty">이 챕터에서 복습할 단어가 없어요. 전부 “안다”로 표시했네요! 👍</div>';
      } else {
        h += '<div class="vgrid">' + cards.map(function (v) { return vcard(v, words.indexOf(v)); }).join("") + '</div>';
      }
    } else {
      h += quizView("vq:" + state.vc + ":" + state.seed, ensureVQuiz(), false);
    }
    return '<section>' + h + '</section>';
  }

  function vcard(v, idx) {
    var st = state.progress.vocab[v.w];
    var meta = st ? STATUS[st] : null;
    var flipped = !!state.flips[v.w];
    var face = flipped
      ? '<p class="vmean">' + esc(v.m) + '</p>' +
        '<p class="vex">“' + esc(v.ex) + '”</p>' +
        '<p class="vtip mono">출제 포인트 · ' + esc(v.tip) + '</p>'
      : '<p class="serif vword">' + esc(v.w) + '</p>' +
        '<p class="vpos mono">' + esc(v.p) + '</p>' +
        '<p class="vhint mono">눌러서 뜻 보기</p>';
    var marks = ["known", "fuzzy", "unknown"].map(function (k) {
      return '<button class="mark ' + STATUS[k].cls + (st === k ? " on" : "") + '" data-action="mark" data-word="' + escA(v.w) + '" data-status="' + k + '">' + STATUS[k].label + '</button>';
    }).join("");
    return '<div class="vcard' + (meta ? " ring-" + meta.cls : "") + '">' +
      '<span class="vnum mono">' + String(idx + 1).padStart(2, "0") + '</span>' +
      (meta ? '<span class="vdot dot-' + meta.cls + '"></span>' : "") +
      '<button class="vface" data-action="flip" data-word="' + escA(v.w) + '">' + face + '</button>' +
      '<div class="marks">' + marks + '</div></div>';
  }

  // ---- 문법 ----
  function grammarTab() {
    var ch = GRAMMAR_CHAPTERS.find(function (c) { return c.id === state.gc; });
    var d = ch.data;
    var h = chips(GRAMMAR_CHAPTERS, state.gc, "gchap");
    h += '<div class="rules">' + d.rules.map(function (r, i) {
      var key = ch.id + "-" + i;
      var open = !!state.open[key];
      return '<div class="rule">' +
        '<button class="rule-h" data-action="rule" data-key="' + key + '">' +
          '<span class="rnum mono">' + (i + 1) + '</span>' +
          '<span class="rt">' + esc(r.t) + '</span>' +
          '<span class="rtoggle mono">' + (open ? "−" : "+") + '</span></button>' +
        (open ? '<div class="rule-b"><p class="rb">' + esc(r.b) + '</p><p class="rex mono">' + esc(r.ex) + '</p></div>' : "") +
        '</div>';
    }).join("") + '</div>';
    h += '<h3 class="serif h3">실전 문제</h3>';
    h += quizView("gq:" + ch.id, d.q, true);
    return '<section>' + h + '</section>';
  }

  // ---- 독해 ----
  function readingTab() {
    var h = '<div class="card note-card"><p class="tip-title">Part 6 단어 고르기 전략</p>' +
      '<p class="tip-body">빈칸 문장만으로 답이 안 나오면 주변 문맥에서 단서를 찾으세요. 시제는 앞뒤 동사·날짜로, 대명사는 앞 문장이 가리키는 대상으로, 접속부사는 앞뒤 문장의 의미 관계로, 어휘는 빈칸 주변 단어로 판단합니다.</p></div>';
    READING.forEach(function (psg, i) {
      h += '<div class="passage"><h3 class="serif h3">' + esc(psg.title) + '</h3>' +
        '<div class="card ptext">' + psg.lines.map(function (l) { return '<p>' + esc(l) + '</p>'; }).join("") + '</div>' +
        quizView("rq:" + i, psg.q, false) + '</div>';
    });
    return '<section class="reading">' + h + '</section>';
  }

  // ---- 공용 퀴즈 ----
  function quizView(quizId, questions, showVocab) {
    var solved = 0, correct = 0;
    questions.forEach(function (q, qi) {
      var p = state.answers[quizId + ":" + qi];
      if (p !== undefined) { solved++; if (p === q.a) correct++; }
    });
    var h = '<div class="qmeta mono"><span>' + solved + " / " + questions.length + ' 풀이 (이번 세트)</span><span class="amber">정답 ' + correct + "</span></div>";
    h += '<div class="qlist">';
    questions.forEach(function (q, qi) {
      var key = quizId + ":" + qi;
      var picked = state.answers[key];
      var done = picked !== undefined;
      h += '<div class="qcard"><p class="qtext"><span class="mono qn">Q' + (qi + 1) + "</span> " + esc(q.q) + "</p>";
      h += '<div class="opts">';
      q.o.forEach(function (opt, oi) {
        var cls = "opt";
        if (done) { if (oi === q.a) cls += " correct"; else if (oi === picked) cls += " wrong"; else cls += " dim"; }
        h += '<button class="' + cls + '"' + (done ? " disabled" : "") +
          ' data-action="answer" data-quiz="' + escA(quizId) + '" data-qi="' + qi + '" data-oi="' + oi + '" data-correct="' + q.a + '">' +
          '<span class="ol mono">' + String.fromCharCode(65 + oi) + "</span> " + esc(opt) + "</button>";
      });
      h += "</div>";
      if (done) { h += '<p class="expl">' + (picked === q.a ? "정답! " : "오답 · ") + esc(q.e) + "</p>"; }
      if (showVocab && done && Array.isArray(q.words)) {
        var linked = q.words.map(function (w) { return VOCAB_MAP[w]; }).filter(Boolean);
        if (linked.length) {
          h += '<div class="vchips">' + linked.map(function (v) { return '<span class="vchip mono">' + esc(v.w) + " · " + esc(v.m) + "</span>"; }).join("") + "</div>";
        }
      }
      h += "</div>";
    });
    h += "</div>";
    return h;
  }

  // ===== 렌더 + 스크롤 유지 =====
  var app = document.getElementById("app");
  function render() {
    var y = window.scrollY;
    var oldChips = app.querySelector(".chips");
    var cx = oldChips ? oldChips.scrollLeft : 0;
    app.innerHTML = view();
    var newChips = app.querySelector(".chips");
    if (newChips) newChips.scrollLeft = cx;
    window.scrollTo(0, y);
  }

  // ===== 이벤트 위임 =====
  app.addEventListener("click", function (e) {
    var el = e.target.closest("[data-action]");
    if (!el) return;
    var a = el.dataset.action;
    if (a === "tab") state.tab = el.dataset.tab;
    else if (a === "vchap") { state.vc = el.dataset.id; state.review = false; }
    else if (a === "gchap") state.gc = el.dataset.id;
    else if (a === "vmode") state.vmode = el.dataset.mode;
    else if (a === "review") state.review = !state.review;
    else if (a === "reseed") state.seed++;
    else if (a === "flip") { var w = el.dataset.word; state.flips[w] = !state.flips[w]; }
    else if (a === "mark") mark(el.dataset.word, el.dataset.status);
    else if (a === "rule") { var k = el.dataset.key; state.open[k] = !state.open[k]; }
    else if (a === "answer") {
      var key = el.dataset.quiz + ":" + el.dataset.qi;
      if (state.answers[key] !== undefined) return;
      state.answers[key] = +el.dataset.oi;
      recordAnswer(+el.dataset.oi === +el.dataset.correct);
    }
    else if (a === "reset-ask") state.confirm = true;
    else if (a === "reset-no") state.confirm = false;
    else if (a === "reset-yes") { state.progress = empty(); state.answers = {}; state.flips = {}; saveNow(); state.confirm = false; }
    render();
  });

  render();
})();

</script>
</body>
</html>
