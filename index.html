<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0c0a09">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="토익 학습기">
<meta name="format-detection" content="telephone=no">
<title>토익 단어·문법 학습기</title>
<style>
:root{
  --bg:#0c0a09; --surface:#1c1917; --inner:#0c0a09; --border:#292524; --border2:#44403c;
  --t1:#f5f5f4; --t2:#a8a29e; --t3:#78716c; --t4:#57534e;
  --amber:#f59e0b; --amber-l:#fcd34d;
  --em:#34d399; --em-l:#6ee7b7; --em-bg:rgba(6,78,59,.5); --em-bd:#065f46;
  --ro:#fb7185; --ro-l:#fda4af; --ro-bg:rgba(76,5,25,.5); --ro-bd:#9f1239;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{
  margin:0; background:var(--bg); color:var(--t1);
  font-family:-apple-system,BlinkMacSystemFont,system-ui,"Segoe UI",Roboto,sans-serif;
  font-size:16px; line-height:1.55; overflow-wrap:break-word;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}
.wrap{max-width:480px; margin:0 auto; padding:18px 16px 48px}
.serif{font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif}
.mono{font-family:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace}
button{font-family:inherit; color:inherit; background:none; border:none; cursor:pointer; touch-action:manipulation; font-size:16px}
p{margin:0}

.amber{color:var(--amber-l)} .em{color:var(--em-l)} .t1{color:var(--t1)}
.eyebrow{font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--t3)}
.eyebrow.amber{color:rgba(245,158,11,.85)}

/* header */
.hd{margin-bottom:16px}
.h1{margin:4px 0 0; font-size:26px; font-weight:700; color:#fafaf9}
.lead{margin-top:8px; font-size:14px; color:var(--t2)}

/* card */
.card{border:1px solid var(--border); background:var(--surface); border-radius:14px}

/* dashboard */
.dash{padding:14px; margin-bottom:18px}
.dash-top{display:flex; align-items:center; justify-content:space-between; margin-bottom:12px}
.reset{font-size:11px; color:var(--t4)}
.reset:active{color:var(--t2)}
.confirm{display:flex; align-items:center; gap:8px; font-size:11px}
.cq{color:var(--t2)}
.cbtn{font-size:11px; padding:3px 9px; border-radius:6px}
.cbtn.yes{background:#7f1d1d; color:var(--ro-l)}
.cbtn.no{background:var(--border); color:var(--t2)}
.stats{display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px}
.stat{background:var(--inner); border-radius:10px; padding:10px 8px}
.lbl{font-size:11px; color:var(--t3)}
.big{margin-top:3px; font-size:22px; font-weight:700; line-height:1.1}
.sub{margin-top:2px; font-size:11px; color:var(--t4)}
.bar{margin-top:12px; height:6px; width:100%; background:var(--border); border-radius:99px; overflow:hidden}
.bar-fill{height:100%; background:var(--amber); border-radius:99px; transition:width .3s}
.note{margin-top:12px; font-size:11px; color:var(--t4)}

/* tabs */
.tabs{display:flex; gap:8px; margin-bottom:14px}
.tab{flex:0 0 auto; padding:8px 14px; min-height:40px; border-radius:10px; font-size:14px; font-weight:600; background:var(--surface); color:var(--t2)}
.tab.active{background:#f5f5f4; color:#0c0a09}

/* chips (가로 스크롤) */
.chips{display:flex; gap:8px; overflow-x:auto; padding-bottom:6px; margin-bottom:14px; -webkit-overflow-scrolling:touch; scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto; display:flex; align-items:center; gap:6px; padding:8px 12px; min-height:40px; border:1px solid var(--border); background:var(--surface); border-radius:10px; color:var(--t2); font-size:14px; font-weight:500; white-space:nowrap}
.chip.active{border-color:#b45309; background:rgba(245,158,11,.1); color:var(--amber-l)}
.chip-l{font-size:11px; color:var(--t3)}

/* pills */
.pills{display:flex; align-items:center; gap:8px; margin-bottom:14px; flex-wrap:wrap}
.pill{padding:8px 12px; min-height:38px; border-radius:8px; font-size:14px; font-weight:500; background:var(--border); color:var(--t2)}
.pill.active{background:var(--amber); color:#0c0a09}
.minibtn{padding:7px 12px; min-height:36px; border-radius:8px; font-size:12px; background:var(--border); color:var(--t3); font-family:ui-monospace,Menlo,monospace}
.minibtn.right{margin-left:auto}
.minibtn.on{background:#7f1d1d; color:var(--ro-l)}

/* vocab — 세션 진행 바 */
.vprog{display:flex; align-items:center; gap:10px; margin-bottom:14px; font-size:12px; color:var(--t3)}
.vprog .pbar{flex:1; height:6px; background:var(--border); border-radius:99px; overflow:hidden}
.vprog .pfill{height:100%; background:var(--amber); border-radius:99px; transition:width .3s}
.vprog .pn{font-family:ui-monospace,Menlo,monospace; white-space:nowrap}

/* vocab — 예문 빈칸 문제 카드 */
.vstep{border:1px solid var(--border); background:var(--surface); border-radius:14px; padding:16px 15px}
.vtag{display:flex; align-items:center; justify-content:space-between; margin-bottom:12px}
.vtag .lvl{font-size:11px; letter-spacing:.12em; text-transform:uppercase; font-family:ui-monospace,Menlo,monospace}
.lvl.new{color:rgba(245,158,11,.85)}
.lvl.learn{color:var(--amber-l)}
.lvl.due{color:var(--ro-l)}
.vtag .seen{font-size:11px; color:var(--t4); font-family:ui-monospace,Menlo,monospace}
.cloze{font-size:18px; line-height:1.7; color:#e7e5e4; font-family:"Iowan Old Style",Palatino,Georgia,serif}
.blank{display:inline-block; min-width:76px; text-align:center; border-bottom:2px solid var(--amber); color:var(--amber-l); font-weight:600; padding:0 6px; font-family:inherit}
.blank.filled{border-bottom-color:var(--em); color:var(--em-l)}
.blank.filled.bad{border-bottom-color:var(--ro); color:var(--ro-l)}
.vopts{display:flex; flex-direction:column; gap:8px; margin-top:16px}
.vopt{display:flex; align-items:center; gap:10px; width:100%; text-align:left; border:1px solid var(--border2); background:var(--border); color:var(--t1); border-radius:10px; padding:12px 13px; min-height:46px; font-size:15px; line-height:1.35}
.vopt .ol{font-size:12px; color:var(--t3); font-family:ui-monospace,Menlo,monospace; flex:0 0 auto}
.vopt.correct{border-color:#059669; background:var(--em-bg); color:var(--em-l)}
.vopt.wrong{border-color:var(--ro-bd); background:var(--ro-bg); color:var(--ro-l)}
.vopt.dim{border-color:var(--border); background:var(--surface); color:var(--t4)}

/* vocab — 정답 공개(학습) 영역 */
.vreveal{margin-top:16px; border-top:1px solid var(--border); padding-top:14px}
.rvmean{font-size:20px; font-weight:600; color:var(--amber-l); font-family:"Iowan Old Style",Palatino,Georgia,serif}
.rvpos{font-size:11px; color:var(--t3); font-family:ui-monospace,Menlo,monospace; margin-left:8px}
.rvsent{margin-top:10px; font-size:14px; color:var(--t2); font-style:italic; line-height:1.55}
.rvsent b{color:var(--em-l); font-style:normal}
.rvtip{margin-top:10px; font-size:12px; color:var(--t2); background:var(--inner); border-radius:8px; padding:8px 10px; line-height:1.5}
.rvtip .k{color:rgba(245,158,11,.85); font-family:ui-monospace,Menlo,monospace; margin-right:6px}

/* vocab — 자가평가 */
.srq{margin-top:16px; font-size:12px; color:var(--t3); text-align:center}
.srate{display:flex; gap:8px; margin-top:10px}
.srbtn{flex:1; padding:12px 6px; min-height:48px; border-radius:10px; font-size:14px; font-weight:600; border:1px solid var(--border2); background:var(--border); color:var(--t2)}
.srbtn.know{border-color:#065f46}
.srbtn.know:active{background:#064e3b; color:var(--em-l)}
.srbtn.fuzzy:active{background:#78350f; color:var(--amber-l)}
.srbtn.no{border-color:#7f1d1d}
.srbtn.no:active{background:#7f1d1d; color:var(--ro-l)}
.srsub{display:block; font-size:11px; font-weight:400; color:var(--t4); margin-top:2px; font-family:ui-monospace,Menlo,monospace}

.empty{border:1px solid var(--border); background:var(--surface); border-radius:14px; padding:32px 18px; text-align:center; font-size:14px; color:var(--t2); line-height:1.6}
.empty .eb{margin-top:14px; display:inline-block; padding:10px 18px; min-height:44px; border-radius:10px; background:var(--amber); color:#0c0a09; font-weight:600; font-size:14px}

/* 해석 보기 */
.trbtn{margin-top:8px; display:inline-block; padding:6px 12px; min-height:34px; border-radius:8px; font-size:12px; border:1px solid var(--border2); background:var(--border); color:var(--amber-l); font-family:ui-monospace,Menlo,monospace}
.rvtr{margin-top:8px; font-size:14px; color:#d6d3d1; line-height:1.6; background:var(--inner); border-left:2px solid var(--amber); border-radius:0 8px 8px 0; padding:8px 12px}

/* 오답노트 목록 */
.nblist{display:flex; flex-direction:column; gap:8px}
.nbrow{display:flex; align-items:baseline; gap:10px; border:1px solid var(--border); background:var(--surface); border-radius:10px; padding:11px 13px}
.nbw{font-size:17px; font-weight:600; color:#fafaf9; flex:0 0 auto}
.nbm{font-size:13px; color:var(--t2); flex:1; line-height:1.4}
.nbc{font-size:11px; color:var(--t4); flex:0 0 auto}

/* rules */
.rules{display:flex; flex-direction:column; gap:8px; margin-bottom:22px}
.rule{border:1px solid var(--border); background:var(--surface); border-radius:14px; overflow:hidden}
.rule-h{display:flex; align-items:center; gap:12px; width:100%; text-align:left; padding:12px 14px; min-height:52px}
.rnum{flex:0 0 auto; width:28px; height:28px; display:flex; align-items:center; justify-content:center; border-radius:8px; background:var(--amber); color:#0c0a09; font-size:14px; font-weight:700}
.rt{flex:1; font-size:14px; font-weight:500}
.rtoggle{color:var(--t3); font-size:16px}
.rule-b{border-top:1px solid var(--border); padding:12px 14px}
.rb{font-size:14px; color:var(--t2); line-height:1.55}
.rex{margin-top:8px; font-size:12px; color:rgba(253,230,138,.9); background:var(--inner); border-radius:8px; padding:8px 10px; line-height:1.5}
.h3{margin:0 0 12px; font-size:18px; font-weight:600}

/* quiz */
.qmeta{display:flex; justify-content:space-between; font-size:12px; color:var(--t3); margin-bottom:12px}
.qlist{display:flex; flex-direction:column; gap:12px}
.qcard{border:1px solid var(--border); background:var(--surface); border-radius:14px; padding:14px}
.qtext{font-size:15px; font-weight:500; line-height:1.55; color:var(--t1)}
.qn{margin-right:8px; font-size:12px; color:var(--t3)}
.opts{display:flex; flex-direction:column; gap:8px; margin-top:12px}
.opt{display:block; width:100%; text-align:left; border:1px solid var(--border2); background:var(--border); color:var(--t1); border-radius:10px; padding:11px 12px; min-height:44px; font-size:14px; line-height:1.4}
.opt .ol{margin-right:8px; font-size:12px; color:var(--t3)}
.opt.correct{border-color:#059669; background:var(--em-bg); color:var(--em-l)}
.opt.wrong{border-color:var(--ro-bd); background:var(--ro-bg); color:var(--ro-l)}
.opt.dim{border-color:var(--border); background:var(--surface); color:var(--t4)}
.expl{margin-top:12px; border:1px solid var(--border); background:var(--inner); border-radius:10px; padding:10px 12px; font-size:14px; line-height:1.55; color:var(--t2)}
.vchips{display:flex; flex-wrap:wrap; gap:8px; margin-top:10px}
.vchip{background:var(--border); border-radius:8px; padding:6px 8px; font-size:12px; color:rgba(253,230,138,.9)}

/* reading */
.reading{display:flex; flex-direction:column; gap:26px}
.note-card{padding:14px}
.tip-title{font-size:14px; font-weight:500; color:var(--amber-l)}
.tip-body{margin-top:8px; font-size:14px; color:var(--t2); line-height:1.55}
.passage .ptext{padding:14px; font-size:14px; line-height:1.6; color:#e7e5e4; margin-bottom:14px}
.passage .ptext p{margin-bottom:8px}
.passage .ptext p:last-child{margin-bottom:0}

footer{margin-top:36px; text-align:center; font-size:11px; color:var(--t4); font-family:ui-monospace,Menlo,monospace}
</style>
</head>
<body>
<div class="wrap">
  <div id="app"></div>
  <footer>업로드한 교재를 바탕으로 재구성한 개인 학습용 콘텐츠</footer>
</div>
<script>
const VOCAB_V1 = [
  { w: "determine", p: "동사", m: "알아내다, 결정하다", ex: "A survey can help the company determine customer needs.", tr: "설문조사는 회사가 고객의 요구를 파악하는 데 도움이 될 수 있다.", tip: "decide와 의미가 비슷" },
  { w: "withdraw", p: "동사", m: "물러나다, 인출하다", ex: "She had to withdraw from the negotiation due to illness.", tr: "그녀는 병 때문에 협상에서 빠져야 했다.", tip: "withdraw from: ~에서 빠지다" },
  { w: "anticipate", p: "동사", m: "예상하다, 기대하다", ex: "Managers anticipate strong demand next quarter.", tr: "관리자들은 다음 분기에 강한 수요를 예상한다.", tip: "expect와 의미가 같음" },
  { w: "monitor", p: "동사", m: "관찰하다, 감시하다", ex: "The team monitors social media trends closely.", tr: "그 팀은 소셜 미디어 동향을 면밀히 관찰한다.", tip: "'감시 장치'라는 명사로도 쓰임" },
  { w: "analyze", p: "동사", m: "분석하다", ex: "Analysts carefully analyzed the quarterly sales data.", tr: "분석가들은 분기 매출 데이터를 신중히 분석했다.", tip: "명사 analysis, 사람 analyst" },
  { w: "surpass", p: "동사", m: "뛰어넘다, 능가하다", ex: "Sales surpassed the annual goal this year.", tr: "올해 매출이 연간 목표를 뛰어넘었다.", tip: "exceed와 의미가 비슷" },
  { w: "explore", p: "동사", m: "탐구하다, 알아보다", ex: "The board will explore new market options.", tr: "이사회는 새로운 시장 선택지를 알아볼 것이다.", tip: "명사 exploration" },
  { w: "name", p: "동사", m: "임명하다, 지명하다", ex: "The CEO will name a successor next week.", tr: "CEO는 다음 주에 후임자를 지명할 것이다.", tip: "appoint와 유사 / name A (as) B" },
  { w: "redeem", p: "동사", m: "(상품·현금으로) 교환하다", ex: "Points can be redeemed for store products.", tr: "포인트는 매장 상품으로 교환될 수 있다.", tip: "be redeemed for A" },
  { w: "excel", p: "동사", m: "뛰어나다, 잘하다", ex: "She excels at analyzing research data.", tr: "그녀는 연구 데이터를 분석하는 데 뛰어나다.", tip: "excel at/in A" },
  { w: "optimize", p: "동사", m: "최적화하다", ex: "The update optimizes the security system.", tr: "이 업데이트는 보안 시스템을 최적화한다.", tip: "형용사 optimal" },
  { w: "differ", p: "동사", m: "다르다", ex: "The new model differs from earlier versions.", tr: "새 모델은 이전 버전들과 다르다.", tip: "differ from: ~과 다르다" },
  { w: "conform", p: "동사", m: "(규정에) 따르다, 일치하다", ex: "The café renovated its patio to conform to new rules.", tr: "그 카페는 새 규정에 맞추기 위해 테라스를 개조했다.", tip: "conform to/with A" },
  { w: "resolve", p: "동사", m: "(문제를) 해결하다", ex: "The technician resolved the printer issue quickly.", tr: "기술자가 프린터 문제를 빠르게 해결했다.", tip: "명사 resolution" },
  { w: "suspend", p: "동사", m: "중단하다, 정지하다", ex: "The project was suspended until funding is secured.", tr: "그 프로젝트는 자금이 확보될 때까지 중단되었다.", tip: "명사 suspension" },
  { w: "resume", p: "동사", m: "재개하다, 다시 시작하다", ex: "The seminar will resume after a short break.", tr: "세미나는 짧은 휴식 후에 다시 시작될 것이다.", tip: "cf. résumé(이력서)와 철자 유사" },
  { w: "extend", p: "동사", m: "연장하다, 늘이다", ex: "The manager extended the deadline by a week.", tr: "관리자는 마감을 일주일 연장했다.", tip: "extend an invitation: 초대하다 / 명사 extension" },
  { w: "commence", p: "동사", m: "시작되다, 개시하다", ex: "The board meeting commenced with a sales review.", tr: "이사회는 매출 검토로 시작되었다.", tip: "initiate와 의미가 같음" },
  { w: "specify", p: "동사", m: "구체적으로 명시하다", ex: "Please specify your payment method on the form.", tr: "양식에 결제 수단을 명시해 주세요.", tip: "형용사 specific" },
  { w: "commend", p: "동사", m: "칭찬하다, 추천하다", ex: "Her supervisor commended her on the presentation.", tr: "그녀의 상사는 발표에 대해 그녀를 칭찬했다.", tip: "commend A on/for B" },
  { w: "consult", p: "동사", m: "상담하다, 참조하다", ex: "Operators may consult the technicians for tips.", tr: "작업자들은 조언을 얻기 위해 기술자에게 문의할 수 있다.", tip: "consult + 사람 / consult + 자료" },
  { w: "reserve", p: "동사", m: "예약하다, 보유하다", ex: "Attendees must reserve their own accommodations.", tr: "참석자들은 각자 숙소를 예약해야 한다.", tip: "명사 reservation" },
  { w: "deliberate", p: "동사", m: "심사숙고하다, 심의하다", ex: "The board deliberated over the merger all afternoon.", tr: "이사회는 오후 내내 합병을 숙고했다.", tip: "'신중한'이라는 형용사로도 쓰임" },
  { w: "exceed", p: "동사", m: "(수·양)을 넘다, 초과하다", ex: "Carry-on baggage must not exceed 10 kilograms.", tr: "기내 수하물은 10킬로그램을 초과해서는 안 된다.", tip: "명사 excess" },
  { w: "address", p: "동사", m: "다루다, 제기하다", ex: "Officials will address the recent benefit changes.", tr: "관계자들은 최근 복리후생 변경 사항을 다룰 것이다.", tip: "address issues / '주소, 연설'의 명사로도 쓰임" },
  { w: "represent", p: "동사", m: "나타내다, 의미하다", ex: "These figures represent a rise in profits.", tr: "이 수치들은 수익 증가를 나타낸다.", tip: "명사 representative(대표)" },

    vphase: "ask",       // ask(고르기) | reveal(정답·학습)
    vpick: null,         // 고른 보기 인덱스
    showTr: false,       // 해석 보기 토글
    nbActive: false,     // 오답노트 복습 중인지
    nbq: null, nbphase: "ask", nbpick: null,
    session: { done: 0, correct: 0 },
    reviewAll: false,    // true면 '익힘' 단어까지 다시 포함
    open: {}, answers: {},
    confirm: false,
  };
  GRAMMAR_CHAPTERS.forEach(function (c) { state.open[c.id + "-0"] = true; });

  // ===== 유틸 =====
  function esc(s) { return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
  function escA(s) { return esc(s).replace(/"/g, "&quot;"); }
  function shuffle(a) { a = a.slice(); for (var i = a.length - 1; i > 0; i--) { var j = Math.floor(Math.random() * (i + 1)); var t = a[i]; a[i] = a[j]; a[j] = t; } return a; }

  // ===== 단어 엔진: 예문 빈칸 + 간격 반복(SRS) =====

  // 예문에서 목표 단어(변화형 포함)를 찾아 빈칸으로 만든다. 못 찾으면 문구의 첫 내용어를 빈칸 처리.
  function findBlank(word, sentence) {
    var base = word.toLowerCase();
    // 문구형(예: "be enthusiastic about")
    if (base.indexOf(" ") >= 0) {
      var core = base.replace(/^be\s+/, "");
      var lo = sentence.toLowerCase(), i = lo.indexOf(core);
      if (i >= 0) return { b: sentence.slice(0, i), m: sentence.slice(i, i + core.length), a: sentence.slice(i + core.length) };
      // 폴백: 문구의 첫 알파벳 단어(be/관사 제외)를 빈칸
      var toks = core.split(/\s+/).filter(function (t) { return t && ["a", "an", "the", "to", "as", "of", "b"].indexOf(t) < 0; });
      for (var t = 0; t < toks.length; t++) {
        var re0 = new RegExp("\\b" + esc0(toks[t]) + "\\b");
        var mm0 = re0.exec(lo);
        if (mm0) return { b: sentence.slice(0, mm0.index), m: sentence.slice(mm0.index, mm0.index + toks[t].length), a: sentence.slice(mm0.index + toks[t].length) };
      }
      return null;
    }
    var cands = [base, base + "s", base + "es", base + "ed", base + "d", base + "ing"];
    if (base.charAt(base.length - 1) === "e") { var st = base.slice(0, -1); cands.push(st + "ing", st + "ed"); }
    if (base.charAt(base.length - 1) === "y") { var sy = base.slice(0, -1); cands.push(sy + "ies", sy + "ied"); }
    cands = cands.filter(function (v, k, arr) { return arr.indexOf(v) === k; }).sort(function (a, b) { return b.length - a.length; });
    var low = sentence.toLowerCase();
    for (var c = 0; c < cands.length; c++) {
      var re = new RegExp("\\b" + esc0(cands[c]) + "\\b");
      var mm = re.exec(low);
      if (mm) return { b: sentence.slice(0, mm.index), m: sentence.slice(mm.index, mm.index + cands[c].length), a: sentence.slice(mm.index + cands[c].length) };
    }
    return null;
  }
  function esc0(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"); }
  // 보기에 표시할 형태(문구는 'be ' 제거)
  function optForm(w) { return w.indexOf(" ") >= 0 ? w.replace(/^be\s+/, "") : w; }

  function boxOf(w) { var r = state.progress.vocab[w]; return r ? r.box : -1; } // -1 = 신규
  function levelOf(w) { var b = boxOf(w); if (b < 0) return "new"; if (b <= 0) return "due"; if (b >= MAXBOX) return "known"; return "learn"; }

  // 메인 학습 큐: 오답노트(box0)와 익힘(box>=MAX)은 제외. 우선순위 = 신규 → 학습중(낮은 box 먼저)
  function pickNext(words, avoidWord) {
    var pool = words.filter(function (v) {
      var b = boxOf(v.w);
      if (b === 0) return false;                          // box0 = 오답노트로 분리 → 메인 큐 제외
      if (!state.reviewAll && b >= MAXBOX) return false;  // 익힌 단어는 스킵
      return true;
    });
    if (!pool.length) return null;
    function rank(v) { var b = boxOf(v.w); if (b < 0) return 1; return b + 1; } // 1=신규, 2=box1, ...
    var minRank = Math.min.apply(null, pool.map(rank));
    var top = pool.filter(function (v) { return rank(v) === minRank; });
    if (top.length > 1 && avoidWord) { var f = top.filter(function (v) { return v.w !== avoidWord; }); if (f.length) top = f; }
    return top[Math.floor(Math.random() * top.length)];
  }

  function buildQuestion(words, target) {
    var blank = findBlank(target.w, target.ex);
    var distract = shuffle(words.filter(function (x) { return x.w !== target.w; })).slice(0, 3);
    var opts = shuffle([target].concat(distract));
    return {
      word: target.w,
      blank: blank,                 // {b,m,a} 또는 null
      ex: target.ex,
      tr: target.tr || "",          // 예문 한글 해석
      opts: opts.map(function (o) { return { w: o.w, label: optForm(o.w) }; }),
      answer: opts.map(function (o) { return o.w; }).indexOf(target.w),
      meaning: target.m, pos: target.p, tip: target.tip,
    };
  }

  function nextQuestion() {
    var ch = VOCAB_CHAPTERS.find(function (c) { return c.id === state.vc; });
    var avoid = state.vq ? state.vq.word : null;
    var target = pickNext(ch.words, avoid);
    state.vq = target ? buildQuestion(ch.words, target) : null;
    state.vphase = "ask";
    state.vpick = null;
    state.showTr = false;
  }

  // ===== 오답노트 (box0 단어만) =====
  function box0List() {
    var res = [];
    VOCAB_CHAPTERS.forEach(function (c) {
      c.words.forEach(function (w) { if (boxOf(w.w) === 0) res.push({ item: w, ch: c }); });
    });
    return res;
  }
  function nextNotebook() {
    var pool = box0List();
    if (!pool.length) { state.nbq = null; state.nbphase = "ask"; state.nbpick = null; state.showTr = false; return; }
    var avoid = state.nbq ? state.nbq.word : null;
    var choices = pool.filter(function (p) { return p.item.w !== avoid; });
    if (!choices.length) choices = pool;
    var pk = choices[Math.floor(Math.random() * choices.length)];
    state.nbq = buildQuestion(pk.ch.words, pk.item);
    state.nbphase = "ask"; state.nbpick = null; state.showTr = false;
  }

  // 자가평가 + 정답 여부 → 박스 갱신
  function gradeWord(word, correct, rate) {
    var v = state.progress.vocab, cur = v[word] || { box: 0, seen: 0, right: 0 };
    var box = cur.box;
    if (rate === "no") box = 0;                                   // 모른다 → 오답노트로
    else if (correct && rate === "know") box = Math.min(MAXBOX, box + 1); // 안다 & 정답 → 승급
    else box = Math.max(1, box);                                  // 애매 or 오답(모름 아님) → 학습중(오답노트 탈출)
    v[word] = { box: box, seen: cur.seen + 1, right: cur.right + (correct ? 1 : 0) };
    saveNow();
  }

  function stats() {
    var v = state.progress.vocab;
    var known = 0, learning = 0;
    Object.keys(v).forEach(function (k) { var b = v[k].box; if (b >= MAXBOX) known++; else learning++; });
    var tot = state.progress.quiz.total;
    var rate = tot.solved ? Math.round((tot.correct / tot.solved) * 100) : 0;
    var t = state.progress.quiz.days[today()] || { solved: 0, correct: 0 };
    return { known: known, learning: learning, seenCount: known + learning, solved: tot.solved, correct: tot.correct, rate: rate, today: t };
  }

  function recordAnswer(ok) {
    var q = state.progress.quiz, d = today();
    var day = q.days[d] || { solved: 0, correct: 0 };
    q.days[d] = { solved: day.solved + 1, correct: day.correct + (ok ? 1 : 0) };
    q.total = { solved: q.total.solved + 1, correct: q.total.correct + (ok ? 1 : 0) };
    saveNow();
  }

  // ===== 뷰 =====
  function view() { return header() + dashboard() + tabsView() + bodyView(); }

  function header() {
    return '<header class="hd">' +
      '<p class="mono eyebrow">Hackers TOEIC RC · 어휘 &amp; 문법</p>' +
      '<h1 class="serif h1">토익 단어·문법 학습기</h1>' +
      '<p class="lead">예문 빈칸에 알맞은 단어를 고르고, 아는 단어는 넘기세요. 모르는 단어만 반복해서 돌아와요.</p>' +
      '</header>';
  }

  function dashboard() {
    var s = stats();
    var right = state.confirm
      ? '<span class="confirm mono"><span class="cq">초기화할까요?</span>' +
        '<button class="cbtn yes" data-action="reset-yes">예</button>' +
        '<button class="cbtn no" data-action="reset-no">아니요</button></span>'
      : '<button class="reset mono" data-action="reset-ask">진도 초기화</button>';
    return '<section class="card dash">' +
      '<div class="dash-top"><span class="mono eyebrow amber">학습 현황</span>' + right + '</div>' +
      '<div class="stats">' +
        stat("익힌 단어", s.known, "/ " + TOTAL_VOCAB, "em") +
        stat("누적 정답률", s.rate + "%", s.correct + "/" + s.solved, "amber") +
        stat("오늘 푼 문제", s.today.solved, "정답 " + s.today.correct, "t1") +
      '</div>' +
      '<div class="bar"><div class="bar-fill" style="width:' + Math.round((s.known / TOTAL_VOCAB) * 100) + '%"></div></div>' +
      '<p class="mono note">' + (storageOK
        ? "진도는 이 기기에 자동 저장돼요 · 복습 중 " + s.learning + "개"
        : "이 브라우저에서 저장이 막혀 있어 진도가 유지되지 않아요 (사파리 개인정보 보호 모드 등).") +
      '</p></section>';
  }
  function stat(label, value, sub, accent) {
    return '<div class="stat"><p class="mono lbl">' + esc(label) + '</p>' +
      '<p class="serif big ' + accent + '">' + esc(value) + '</p>' +
      '<p class="mono sub">' + esc(sub) + '</p></div>';
  }

  function tabsView() {
    var nb = box0List().length;
    var t = [["vocab", "단어 · " + TOTAL_VOCAB], ["notebook", "오답노트" + (nb ? " · " + nb : "")], ["grammar", "문법 · " + GRAMMAR_CHAPTERS.length], ["reading", "독해 · Part 6"]];
    return '<div class="tabs">' + t.map(function (x) {
      return '<button class="tab' + (state.tab === x[0] ? " active" : "") + '" data-action="tab" data-tab="' + x[0] + '">' + esc(x[1]) + '</button>';
    }).join("") + '</div>';
  }

  function chips(list, currentId, action) {
    return '<div class="chips">' + list.map(function (c) {
      var on = c.id === currentId;
      return '<button class="chip' + (on ? " active" : "") + '" data-action="' + action + '" data-id="' + c.id + '">' +
        '<span class="chip-l mono">' + esc(c.label) + '</span> ' + esc(c.title) + '</button>';
    }).join("") + '</div>';
  }

  function bodyView() {
    if (state.tab === "vocab") return vocabTab();
    if (state.tab === "notebook") return notebookTab();
    if (state.tab === "grammar") return grammarTab();
    return readingTab();
  }

  // ---- 단어 (예문 빈칸 + SRS 스텝) ----
  function vocabTab() {
    var ch = VOCAB_CHAPTERS.find(function (c) { return c.id === state.vc; });
    var h = chips(VOCAB_CHAPTERS, state.vc, "vchap");

    // 챕터 진행 요약
    var words = ch.words;
    var remaining = words.filter(function (v) { return state.reviewAll ? true : boxOf(v.w) < MAXBOX; }).length;
    var mastered = words.length - words.filter(function (v) { return boxOf(v.w) < MAXBOX; }).length;
    var pct = words.length ? Math.round((mastered / words.length) * 100) : 0;
    h += '<div class="vprog">' +
      '<span class="pn">' + ch.title + ' · 익힘 ' + mastered + '/' + words.length + '</span>' +
      '<span class="pbar"><span class="pfill" style="width:' + pct + '%"></span></span>' +
      '<button class="minibtn' + (state.reviewAll ? " on" : "") + '" data-action="reviewall">' + (state.reviewAll ? "전체 복습 중" : "모르는 것만") + '</button>' +
      '</div>';

    // 현재 문제가 없으면 새로 뽑기
    if (!state.vq && state.vphase === "ask") nextQuestion();

    if (!state.vq) {
      var nbHere = words.filter(function (v) { return boxOf(v.w) === 0; }).length;
      h += '<div class="empty">이 챕터에서 학습할 단어를 다 봤어요. 👍' +
        (nbHere ? '<br>“모른다”로 넘긴 ' + nbHere + '개는 <b>오답노트</b>에 있어요.' : '') +
        '<br><button class="eb" data-action="reviewall">' + (state.reviewAll ? "익힘 단어까지 다시 복습 중" : "익힌 단어까지 전체 다시 복습") + '</button></div>';
      return '<section>' + h + '</section>';
    }

    h += stepView(state.vq, state.vphase, state.vpick);
    return '<section>' + h + '</section>';
  }

  // ---- 오답노트 (box0 단어) ----
  function notebookTab() {
    var list = box0List();
    var h = "";
    if (!list.length) {
      h += '<div class="empty">오답노트가 비어 있어요.<br>단어 학습 중 “모른다”로 넘긴 단어가 여기 모입니다.</div>';
      state.nbActive = false;
      return '<section>' + h + '</section>';
    }

    if (state.nbActive) {
      if (!state.nbq && state.nbphase === "ask") nextNotebook();
      if (!state.nbq) { // 방금 마지막 단어를 처리해 비워짐
        state.nbActive = false;
        h += '<div class="empty">오답노트를 다 정리했어요! 🎉<br>다시 “모른다”로 넘긴 단어가 생기면 여기 모여요.</div>';
        return '<section>' + h + '</section>';
      }
      h += '<div class="vprog">' +
        '<span class="pn">오답노트 복습 · 남은 단어 ' + list.length + '개</span>' +
        '<span class="pbar"><span class="pfill" style="width:0%"></span></span>' +
        '<button class="minibtn" data-action="nbstop">목록으로</button>' +
        '</div>';
      h += stepView(state.nbq, state.nbphase, state.nbpick);
      return '<section>' + h + '</section>';
    }

    // 목록 화면
    h += '<div class="vprog">' +
      '<span class="pn">오답노트 · ' + list.length + '개</span>' +
      '<span class="pbar"></span>' +
      '<button class="minibtn on" data-action="nbstart">복습 시작</button>' +
      '</div>';
    h += '<div class="nblist">' + list.map(function (p) {
      return '<div class="nbrow"><span class="nbw serif">' + esc(p.item.w) + '</span>' +
        '<span class="nbm">' + esc(p.item.m) + '</span>' +
        '<span class="nbc mono">' + esc(p.ch.label) + '</span></div>';
    }).join("") + '</div>';
    return '<section>' + h + '</section>';
  }

  function stepView(q, phase, pick) {
    var lvl = levelOf(q.word);
    var lvlLabel = { "new": "처음 보는 단어", "learn": "학습 중", "due": "오답노트", "known": "익힘" }[lvl];
    var lvlCls = lvl === "new" ? "new" : lvl === "due" ? "due" : "learn";
    var rec = state.progress.vocab[q.word];
    var seen = rec ? "· " + rec.seen + "회 봄" : "";
    var reveal = phase === "reveal";
    var correct = pick === q.answer;

    // 빈칸 문장
    var b = q.blank;
    var blankHtml;
    if (b) {
      var inner = "______";
      if (reveal) inner = correct ? esc(b.m) : (pick != null ? esc(q.opts[pick].label) : "______");
      blankHtml = esc(b.b) + '<span class="blank' + (reveal ? " filled" + (correct ? "" : " bad") : "") + '">' + inner + '</span>' + esc(b.a);
    } else {
      blankHtml = esc(q.ex);
    }

    var h = '<div class="vstep">' +
      '<div class="vtag"><span class="lvl ' + lvlCls + '">' + lvlLabel + '</span><span class="seen">' + seen + '</span></div>' +
      '<p class="cloze">' + blankHtml + '</p>';

    // 보기
    h += '<div class="vopts">';
    q.opts.forEach(function (o, oi) {
      var cls = "vopt";
      if (reveal) { if (oi === q.answer) cls += " correct"; else if (oi === pick) cls += " wrong"; else cls += " dim"; }
      h += '<button class="' + cls + '"' + (reveal ? " disabled" : "") +
        ' data-action="vanswer" data-oi="' + oi + '">' +
        '<span class="ol">' + String.fromCharCode(65 + oi) + '</span>' + esc(o.label) + '</button>';
    });
    h += '</div>';

    // 정답 공개 + 학습 + 해석 + 자가평가
    if (reveal) {
      h += '<div class="vreveal">' +
        '<p><span class="rvmean">' + esc(q.word) + '</span><span class="rvpos">' + esc(q.pos) + ' · ' + esc(q.meaning) + '</span></p>' +
        '<p class="rvsent">“' + sentenceWithBold(q) + '”</p>' +
        (q.tr ? '<button class="trbtn" data-action="toggletr">' + (state.showTr ? "해석 숨기기 ▲" : "해석 보기 ▼") + '</button>' +
          (state.showTr ? '<p class="rvtr">' + esc(q.tr) + '</p>' : '') : '') +
        '<p class="rvtip"><span class="k">출제 포인트</span>' + esc(q.tip) + '</p>' +
        '<p class="srq">이 단어, 얼마나 확실했나요?</p>' +
        '<div class="srate">' +
          '<button class="srbtn no" data-action="vrate" data-rate="no">모른다<span class="srsub">오답노트</span></button>' +
          '<button class="srbtn fuzzy" data-action="vrate" data-rate="fuzzy">애매<span class="srsub">유지</span></button>' +
          '<button class="srbtn know" data-action="vrate" data-rate="know">안다<span class="srsub">승급</span></button>' +
        '</div></div>';
    }

    h += '</div>';
    return h;
  }

  // 원래 예문에서 정답 단어를 굵게 표시
  function sentenceWithBold(q) {
    if (!q.blank) return esc(q.ex);
    return esc(q.blank.b) + "<b>" + esc(q.blank.m) + "</b>" + esc(q.blank.a);
  }

  // ---- 문법 ----
  function grammarTab() {
    var ch = GRAMMAR_CHAPTERS.find(function (c) { return c.id === state.gc; });
    var d = ch.data;
    var h = chips(GRAMMAR_CHAPTERS, state.gc, "gchap");
    h += '<div class="rules">' + d.rules.map(function (r, i) {
      var key = ch.id + "-" + i;
      var open = !!state.open[key];
      return '<div class="rule">' +
        '<button class="rule-h" data-action="rule" data-key="' + key + '">' +
          '<span class="rnum mono">' + (i + 1) + '</span>' +
          '<span class="rt">' + esc(r.t) + '</span>' +
          '<span class="rtoggle mono">' + (open ? "−" : "+") + '</span></button>' +
        (open ? '<div class="rule-b"><p class="rb">' + esc(r.b) + '</p><p class="rex mono">' + esc(r.ex) + '</p></div>' : "") +
        '</div>';
    }).join("") + '</div>';
    h += '<h3 class="serif h3">실전 문제</h3>';
    h += quizView("gq:" + ch.id, d.q, true);
    return '<section>' + h + '</section>';
  }

  // ---- 독해 ----
  function readingTab() {
    var h = '<div class="card note-card"><p class="tip-title">Part 6 단어 고르기 전략</p>' +
      '<p class="tip-body">빈칸 문장만으로 답이 안 나오면 주변 문맥에서 단서를 찾으세요. 시제는 앞뒤 동사·날짜로, 대명사는 앞 문장이 가리키는 대상으로, 접속부사는 앞뒤 문장의 의미 관계로, 어휘는 빈칸 주변 단어로 판단합니다.</p></div>';
    READING.forEach(function (psg, i) {
      h += '<div class="passage"><h3 class="serif h3">' + esc(psg.title) + '</h3>' +
        '<div class="card ptext">' + psg.lines.map(function (l) { return '<p>' + esc(l) + '</p>'; }).join("") + '</div>' +
        quizView("rq:" + i, psg.q, false) + '</div>';
    });
    return '<section class="reading">' + h + '</section>';
  }

  // ---- 공용 퀴즈 ----
  function quizView(quizId, questions, showVocab) {
    var solved = 0, correct = 0;
    questions.forEach(function (q, qi) {
      var p = state.answers[quizId + ":" + qi];
      if (p !== undefined) { solved++; if (p === q.a) correct++; }
    });
    var h = '<div class="qmeta mono"><span>' + solved + " / " + questions.length + ' 풀이 (이번 세트)</span><span class="amber">정답 ' + correct + "</span></div>";
    h += '<div class="qlist">';
    questions.forEach(function (q, qi) {
      var key = quizId + ":" + qi;
      var picked = state.answers[key];
      var done = picked !== undefined;
      h += '<div class="qcard"><p class="qtext"><span class="mono qn">Q' + (qi + 1) + "</span> " + esc(q.q) + "</p>";
      h += '<div class="opts">';
      q.o.forEach(function (opt, oi) {
        var cls = "opt";
        if (done) { if (oi === q.a) cls += " correct"; else if (oi === picked) cls += " wrong"; else cls += " dim"; }
        h += '<button class="' + cls + '"' + (done ? " disabled" : "") +
          ' data-action="answer" data-quiz="' + escA(quizId) + '" data-qi="' + qi + '" data-oi="' + oi + '" data-correct="' + q.a + '">' +
          '<span class="ol mono">' + String.fromCharCode(65 + oi) + "</span> " + esc(opt) + "</button>";
      });
      h += "</div>";
      if (done) { h += '<p class="expl">' + (picked === q.a ? "정답! " : "오답 · ") + esc(q.e) + "</p>"; }
      if (showVocab && done && Array.isArray(q.words)) {
        var linked = q.words.map(function (w) { return VOCAB_MAP[w]; }).filter(Boolean);
        if (linked.length) {
          h += '<div class="vchips">' + linked.map(function (v) { return '<span class="vchip mono">' + esc(v.w) + " · " + esc(v.m) + "</span>"; }).join("") + "</div>";
        }
      }
      h += "</div>";
    });
    h += "</div>";
    return h;
  }

  // ===== 렌더 + 스크롤 유지 =====
  var app = document.getElementById("app");
  function render() {
    var y = window.scrollY;
    var oldChips = app.querySelector(".chips");
    var cx = oldChips ? oldChips.scrollLeft : 0;
    app.innerHTML = view();
    var newChips = app.querySelector(".chips");
    if (newChips) newChips.scrollLeft = cx;
    window.scrollTo(0, y);
  }

  // ===== 이벤트 위임 =====
  app.addEventListener("click", function (e) {
    var el = e.target.closest("[data-action]");
    if (!el) return;
    var a = el.dataset.action;
    if (a === "tab") { state.tab = el.dataset.tab; if (state.tab !== "notebook") state.nbActive = false; }
    else if (a === "vchap") { state.vc = el.dataset.id; state.vq = null; state.vphase = "ask"; state.vpick = null; state.showTr = false; }
    else if (a === "gchap") state.gc = el.dataset.id;
    else if (a === "reviewall") { state.reviewAll = !state.reviewAll; state.vq = null; state.vphase = "ask"; state.vpick = null; state.showTr = false; }
    else if (a === "toggletr") state.showTr = !state.showTr;
    else if (a === "nbstart") { state.nbActive = true; state.nbq = null; state.nbphase = "ask"; state.nbpick = null; state.showTr = false; }
    else if (a === "nbstop") { state.nbActive = false; state.nbq = null; state.nbphase = "ask"; state.nbpick = null; }
    else if (a === "vanswer") {
      var inNb = state.tab === "notebook" && state.nbActive;
      var q = inNb ? state.nbq : state.vq;
      var ph = inNb ? state.nbphase : state.vphase;
      if (ph === "reveal" || !q) return;
      if (inNb) { state.nbpick = +el.dataset.oi; state.nbphase = "reveal"; }
      else { state.vpick = +el.dataset.oi; state.vphase = "reveal"; }
      recordAnswer(+el.dataset.oi === q.answer);
    }
    else if (a === "vrate") {
      var inNb2 = state.tab === "notebook" && state.nbActive;
      var q2 = inNb2 ? state.nbq : state.vq;
      var ph2 = inNb2 ? state.nbphase : state.vphase;
      var pk2 = inNb2 ? state.nbpick : state.vpick;
      if (ph2 !== "reveal" || !q2) return;
      var ok = pk2 === q2.answer;
      gradeWord(q2.word, ok, el.dataset.rate);
      state.session = { done: state.session.done + 1, correct: state.session.correct + (ok ? 1 : 0) };
      if (inNb2) nextNotebook(); else nextQuestion();
    }
    else if (a === "rule") { var k = el.dataset.key; state.open[k] = !state.open[k]; }
    else if (a === "answer") {
      var key = el.dataset.quiz + ":" + el.dataset.qi;
      if (state.answers[key] !== undefined) return;
      state.answers[key] = +el.dataset.oi;
      recordAnswer(+el.dataset.oi === +el.dataset.correct);
    }
    else if (a === "reset-ask") state.confirm = true;
    else if (a === "reset-no") state.confirm = false;
    else if (a === "reset-yes") { state.progress = empty(); state.answers = {}; state.vq = null; state.vphase = "ask"; state.vpick = null; state.nbActive = false; state.nbq = null; state.nbphase = "ask"; state.nbpick = null; state.showTr = false; state.session = { done: 0, correct: 0 }; saveNow(); state.confirm = false; }
    render();
  });

  render();
})();

</script>
</body>
</html>
